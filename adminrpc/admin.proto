syntax = "proto3";

package adminrpc;

option go_package = "github.com/lightninglabs/darepo/adminrpc";

// OperatorAdmin is the admin/operator management service. It provides
// read-only insight into the server state and control over batching.
// This service is served over a local gRPC socket and is NOT exposed
// through the mailbox transport.
service OperatorAdmin {
    // Info returns basic information about the operator server
    // including version, pubkey, network, and block height.
    rpc Info (InfoRequest) returns (InfoResponse);

    // TriggerBatch manually triggers a new batch round. If a round is
    // already in progress, the request is rejected.
    rpc TriggerBatch (TriggerBatchRequest) returns (TriggerBatchResponse);

    // ListRounds returns a paginated list of past and active rounds.
    rpc ListRounds (ListRoundsRequest) returns (ListRoundsResponse);

    // ListVTXOs returns VTXOs with optional status filtering and cursor
    // pagination.
    rpc ListVTXOs (ListVTXOsRequest) returns (ListVTXOsResponse);

    // GetVTXOStats returns aggregate VTXO statistics: total count,
    // per-status counts, and total locked value.
    rpc GetVTXOStats (GetVTXOStatsRequest) returns (GetVTXOStatsResponse);

    // ListClients returns the set of currently registered mailbox
    // clients.
    rpc ListClients (ListClientsRequest) returns (ListClientsResponse);

    // GetFeeSchedule returns the current fee schedule parameters.
    rpc GetFeeSchedule (GetFeeScheduleRequest) returns (GetFeeScheduleResponse);

    // UpdateFeeSchedule hot-reloads the fee schedule. Changes take
    // effect on the next round without requiring a restart.
    rpc UpdateFeeSchedule (UpdateFeeScheduleRequest)
        returns (UpdateFeeScheduleResponse);

    // GetTreasuryStatus returns the operator's current capital
    // position including deployed liquidity, wallet balance, and
    // utilization ratio.
    rpc GetTreasuryStatus (GetTreasuryStatusRequest)
        returns (GetTreasuryStatusResponse);

    // ListFeeEvents returns paginated ledger entries from the
    // double-entry accounting system.
    rpc ListFeeEvents (ListFeeEventsRequest) returns (ListFeeEventsResponse);

    // GetRoundStatus returns a snapshot of a specific round's
    // in-flight seal-time-fee-handshake counters: intent count,
    // quotes sent/accepted/rejected/timed-out, current seal pass,
    // and the active quote expiry. Useful during reseal storms
    // and for dashboard observability of the #270 handshake.
    rpc GetRoundStatus (GetRoundStatusRequest) returns (GetRoundStatusResponse);
}

// InfoRequest is the request for the Info RPC.
message InfoRequest {
}

// InfoResponse contains basic server state.
message InfoResponse {
    // version is the daemon's semantic version string.
    string version = 1;

    // pubkey is the hex-encoded identity public key of the operator's
    // lnd node.
    string pubkey = 2;

    // network is the active bitcoin network (mainnet, testnet, regtest,
    // etc.).
    string network = 3;

    // block_height is the current best block height known to the
    // backing lnd node.
    uint32 block_height = 4;

    // lnd_alias is the alias of the connected lnd node.
    string lnd_alias = 5;
}

// TriggerBatchRequest is the request for the TriggerBatch RPC.
message TriggerBatchRequest {
}

// TriggerBatchResponse is the response for the TriggerBatch RPC.
message TriggerBatchResponse {
    // round_id is the identifier of the triggered round.
    string round_id = 1;

    // status describes the immediate outcome (e.g. "triggered",
    // "already_in_progress").
    string status = 2;
}

// RoundStatus describes the lifecycle state of a round.
enum RoundStatus {
    ROUND_STATUS_UNSPECIFIED = 0;
    ROUND_STATUS_OPEN = 1;
    ROUND_STATUS_SEALED = 2;
    ROUND_STATUS_SIGNING = 3;
    ROUND_STATUS_BROADCAST = 4;
    ROUND_STATUS_CONFIRMED = 5;
    ROUND_STATUS_FAILED = 6;
}

// ListRoundsRequest is the request for the ListRounds RPC.
message ListRoundsRequest {
    // limit bounds the number of results. Zero uses server default.
    uint32 limit = 1;

    // offset is the number of rounds to skip (for pagination).
    uint32 offset = 2;

    // status_filter optionally restricts results to rounds in the
    // given status. If ROUND_STATUS_UNSPECIFIED, all rounds are
    // returned.
    RoundStatus status_filter = 3;
}

// RoundSummary describes a single round in the list.
message RoundSummary {
    // id is the round identifier.
    string id = 1;

    // status is the current lifecycle state of the round.
    RoundStatus status = 2;

    // tx_id is the commitment transaction ID, if known.
    string tx_id = 3;

    // num_participants is the number of clients that joined this
    // round.
    uint32 num_participants = 4;

    // created_at_unix_s is the unix timestamp when the round was
    // created.
    int64 created_at_unix_s = 5;

    // total_value_sat is the total value locked in this round.
    int64 total_value_sat = 6;
}

// ListRoundsResponse is the response for the ListRounds RPC.
message ListRoundsResponse {
    repeated RoundSummary rounds = 1;

    // total is the total number of rounds matching the filter (for
    // pagination).
    uint32 total = 2;
}

// VTXOStatus describes the lifecycle state of a VTXO from the
// operator's perspective.
enum VTXOStatus {
    VTXO_STATUS_UNSPECIFIED = 0;
    VTXO_STATUS_PENDING = 1;
    VTXO_STATUS_LIVE = 2;
    VTXO_STATUS_FORFEITED = 3;
}

// ListVTXOsRequest is the request for the ListVTXOs RPC.
message ListVTXOsRequest {
    // status_filter optionally restricts results to VTXOs in the
    // given status.
    repeated VTXOStatus status_filter = 1;

    // limit bounds the number of results. Zero uses server default.
    uint32 limit = 2;

    // cursor is an opaque pagination cursor from a prior response.
    uint64 cursor = 3;
}

// VTXOSummary describes a single VTXO.
message VTXOSummary {
    // outpoint is the VTXO outpoint in txid:vout format.
    string outpoint = 1;

    // value_sat is the output value in satoshis.
    int64 value_sat = 2;

    // status is the current lifecycle state.
    VTXOStatus status = 3;

    // round_id is the round that created this VTXO.
    string round_id = 4;

    // pk_script_hex is the hex-encoded output script.
    string pk_script_hex = 5;
}

// ListVTXOsResponse is the response for the ListVTXOs RPC.
message ListVTXOsResponse {
    repeated VTXOSummary vtxos = 1;

    // next_cursor is the pagination cursor for the next page. Zero
    // means no more results.
    uint64 next_cursor = 2;
}

// GetVTXOStatsRequest is the request for the GetVTXOStats RPC.
message GetVTXOStatsRequest {
}

// GetVTXOStatsResponse contains aggregate VTXO statistics.
message GetVTXOStatsResponse {
    // total is the total number of VTXOs across all statuses.
    uint32 total = 1;

    // pending is the number of VTXOs awaiting confirmation.
    uint32 pending = 2;

    // live is the number of confirmed, spendable VTXOs.
    uint32 live = 3;

    // forfeited is the number of forfeited VTXOs.
    uint32 forfeited = 4;

    // total_value_locked_sat is the sum of all live VTXO values.
    int64 total_value_locked_sat = 5;
}

// ListClientsRequest is the request for the ListClients RPC.
message ListClientsRequest {
}

// ClientInfo describes a registered mailbox client.
message ClientInfo {
    // client_id is the internal client identifier.
    string client_id = 1;

    // mailbox_id is the mailbox address of this client.
    string mailbox_id = 2;

    // status describes the connection state (e.g. "active",
    // "disconnected").
    string status = 3;
}

// ListClientsResponse is the response for the ListClients RPC.
message ListClientsResponse {
    repeated ClientInfo clients = 1;
}

// FeeScheduleParams contains all configurable fee parameters.
message FeeScheduleParams {
    // annual_rate is the annualized BTC cost of capital (e.g.
    // 0.05 for 5%).
    double annual_rate = 1;

    // base_margin_sat is the fixed operator margin per operation
    // (satoshis).
    int64 base_margin_sat = 2;

    // utilization_threshold_bps is the utilization level (basis
    // points) above which congestion pricing activates.
    uint32 utilization_threshold_bps = 3;

    // utilization_spread_delta0_bps is the base congestion
    // spread (basis points).
    uint32 utilization_spread_delta0_bps = 4;

    // utilization_spread_delta1_bps is the linear congestion
    // spread coefficient (basis points).
    uint32 utilization_spread_delta1_bps = 5;

    // min_viable_policy is "reject" or "warn".
    string min_viable_policy = 6;

    // min_viable_pct is the max fee-to-amount ratio (percent).
    uint32 min_viable_pct = 7;

    // min_refresh_delta_blocks is the minimum block-delta floor
    // used when computing the liquidity-fee component of a
    // refresh. Zero disables the floor.
    uint32 min_refresh_delta_blocks = 8;
}

// GetFeeScheduleRequest is the request for the GetFeeSchedule
// RPC.
message GetFeeScheduleRequest {
}

// GetFeeScheduleResponse returns the current fee schedule.
message GetFeeScheduleResponse {
    FeeScheduleParams schedule = 1;
}

// UpdateFeeScheduleRequest sets a new fee schedule. All fields
// are required.
message UpdateFeeScheduleRequest {
    FeeScheduleParams schedule = 1;
}

// UpdateFeeScheduleResponse is the response for
// UpdateFeeSchedule.
message UpdateFeeScheduleResponse {
}

// GetTreasuryStatusRequest is the request for GetTreasuryStatus.
message GetTreasuryStatusRequest {
}

// GetTreasuryStatusResponse contains the operator's capital
// position.
message GetTreasuryStatusResponse {
    // deployed_capital_sat is total BTC locked in live VTXOs.
    int64 deployed_capital_sat = 1;

    // wallet_balance_sat is the confirmed on-chain wallet
    // balance.
    int64 wallet_balance_sat = 2;

    // k_max_sat is deployed_capital_sat + wallet_balance_sat.
    int64 k_max_sat = 3;

    // utilization is deployed_capital_sat / k_max_sat (0.0-1.0).
    double utilization = 4;

    // live_vtxo_count is the number of currently live VTXOs.
    int32 live_vtxo_count = 5;
}

// ListFeeEventsRequest is the request for ListFeeEvents.
message ListFeeEventsRequest {
    // limit bounds the number of results.
    uint32 limit = 1;

    // offset is the number of entries to skip.
    uint32 offset = 2;

    // event_type_filter optionally restricts results to entries
    // of the given type (e.g. "boarding_fee", "mining_fee").
    string event_type_filter = 3;
}

// FeeEvent is a single ledger entry.
message FeeEvent {
    // entry_id is the unique ledger entry identifier.
    int64 entry_id = 1;

    // debit_account is the debited account.
    string debit_account = 2;

    // credit_account is the credited account.
    string credit_account = 3;

    // amount_sat is the entry amount in satoshis.
    int64 amount_sat = 4;

    // round_id is the associated round ID (hex), if any.
    string round_id = 5;

    // event_type classifies the entry.
    string event_type = 6;

    // description is a human-readable note.
    string description = 7;

    // created_at_unix_s is the Unix timestamp.
    int64 created_at_unix_s = 8;
}

// ListFeeEventsResponse contains paginated ledger entries.
message ListFeeEventsResponse {
    repeated FeeEvent events = 1;

    // total is the total count of matching entries.
    uint32 total = 2;
}

// GetRoundStatusRequest is the request for the GetRoundStatus
// RPC. Returns NotFound when the round_id does not match an
// in-flight round tracked by the rounds actor.
message GetRoundStatusRequest {
    // round_id identifies the round whose status to return,
    // hex-encoded UUID (16 bytes).
    string round_id = 1;
}

// GetRoundStatusResponse snapshots a round's handshake state.
// Fields are zero when not applicable to the current state (e.g.
// quotes_sent is zero before seal).
message GetRoundStatusResponse {
    // round_id echoes the request round_id for correlation.
    string round_id = 1;

    // state_name is the current FSM state (e.g.
    // "IntentCollectingState", "QuoteSentState",
    // "BatchBuildingState").
    string state_name = 2;

    // intent_count is the number of client intents collected so
    // far (or finalized in the accepted set for post-seal
    // states).
    uint32 intent_count = 3;

    // quotes_sent is the number of JoinRoundQuote messages
    // dispatched during the active (or most recent) seal pass.
    uint32 quotes_sent = 4;

    // quotes_accepted is the number of clients whose nonces
    // arrived within the quote expiry window (implicit accept).
    uint32 quotes_accepted = 5;

    // quotes_rejected is the number of clients who sent
    // JoinRoundReject within the active seal pass.
    uint32 quotes_rejected = 6;

    // quotes_timed_out is the number of clients whose quotes
    // reached quote_expires_at without an accept or reject.
    uint32 quotes_timed_out = 7;

    // current_seal_pass is the zero-indexed reseal iteration.
    uint32 current_seal_pass = 8;

    // quote_expires_at is the Unix timestamp (seconds) of the
    // active quote expiry; zero when not in QuoteSentState.
    int64 quote_expires_at = 9;
}
