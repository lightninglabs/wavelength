name: Docker image build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  schedule:
    # Nightly build at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      checkout:
        description: 'Ref to build (branch, tag, or commit SHA). Defaults to the workflow trigger ref.'
        required: false
        default: ''
      tag_suffix:
        description: 'Optional suffix appended to the manual build tag'
        required: false
        default: ''

defaults:
  run:
    shell: bash

env:
  DOCKER_REPO: 923662548032.dkr.ecr.us-west-2.amazonaws.com/lightninglabs
  DOCKER_IMAGE_WAVED: waved

jobs:
  docker-build-push:
    name: Build and push docker image
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: lightninglabs/gh-actions/setup-qemu-action@2021.01.25.00

      - name: Set up Docker Buildx
        uses: lightninglabs/gh-actions/setup-buildx-action@2021.01.25.00

      - name: Login to AWS ECR
        uses: lightninglabs/gh-actions/login-action@2021.01.25.00
        with:
          registry: ${{ env.DOCKER_REPO }}
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.checkout || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Compute image tags
        id: tags
        env:
          # Pass workflow_dispatch inputs through the environment rather
          # than interpolating ${{ ... }} directly into the shell script.
          # Direct interpolation lets an input value containing shell
          # metacharacters break out of the quoting and inject commands
          # before any in-script sanitization (e.g. the tr pipeline
          # below) can run.
          INPUT_CHECKOUT: ${{ github.event.inputs.checkout }}
          INPUT_TAG_SUFFIX: ${{ github.event.inputs.tag_suffix }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          DATE_TAG="$(date -u +%Y-%m-%d)"
          REPO="${DOCKER_REPO}/${DOCKER_IMAGE_WAVED}"
          TAGS=""
          case "${GITHUB_EVENT_NAME}" in
            push)
              if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                # Released version: pin tag and refresh "latest".
                VERSION="${GITHUB_REF#refs/tags/}"
                TAGS="${REPO}:${VERSION}
          ${REPO}:latest"
              else
                # main commit: tag by sha and refresh "main".
                TAGS="${REPO}:main-${SHORT_SHA}
          ${REPO}:main"
              fi
              ;;
            schedule)
              TAGS="${REPO}:nightly
          ${REPO}:nightly-${DATE_TAG}"
              ;;
            workflow_dispatch)
              # Sanitize both inputs for use in a docker tag: replace
              # any character that's not alphanumeric/dot/underscore/dash
              # with a dash. Empty checkout input means "current ref".
              REF_INPUT="${INPUT_CHECKOUT}"
              if [[ -z "${REF_INPUT}" ]]; then
                REF_INPUT="${SHORT_SHA}"
              fi
              REF_SLUG="$(printf '%s' "${REF_INPUT}" | tr -c 'A-Za-z0-9._-' '-' | cut -c1-60)"
              SUFFIX_SLUG="$(printf '%s' "${INPUT_TAG_SUFFIX}" | tr -c 'A-Za-z0-9._-' '-' | cut -c1-60)"
              if [[ -n "${SUFFIX_SLUG}" ]]; then
                TAGS="${REPO}:manual-${REF_SLUG}-${SUFFIX_SLUG}"
              else
                TAGS="${REPO}:manual-${REF_SLUG}"
              fi
              ;;
          esac
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push waved
        id: docker_build_waved
        uses: lightninglabs/gh-actions/build-push-action@2021.01.25.00
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Image digest
        run: "echo waved: ${{ steps.docker_build_waved.outputs.digest }}"
