syntax = "proto3";

package swaprpc;

option go_package = "github.com/lightninglabs/darepo-client/swaprpc";

import "google/protobuf/timestamp.proto";

// SettlementType identifies which settlement path backs a swap negotiation.
enum SettlementType {
    // SETTLEMENT_TYPE_UNSPECIFIED is accepted as Lightning for backward
    // compatibility with older responses.
    SETTLEMENT_TYPE_UNSPECIFIED = 0;

    // SETTLEMENT_TYPE_LIGHTNING means the swap server bridges to Lightning.
    SETTLEMENT_TYPE_LIGHTNING = 1;

    // SETTLEMENT_TYPE_IN_ARK means sender and receiver settle with one Ark
    // vHTLC inside the same Ark instance.
    SETTLEMENT_TYPE_IN_ARK = 2;
}

// SwapService exposes the external swap server API consumed by the client SDK.
service SwapService {
    // RequestChannelId asks the swap server to allocate a short channel ID and
    // return the route hint the client should use for one Lightning-to-Ark
    // receive flow.
    rpc RequestChannelId (RequestChannelIdRequest)
        returns (RequestChannelIdResponse);

    // CreateInSwap initiates an Ark-to-Lightning swap for the given invoice and
    // returns the negotiated vHTLC parameters.
    rpc CreateInSwap (CreateInSwapRequest) returns (CreateInSwapResponse);

    // AuthorizeInSwapRefund signs a prepared cooperative refund spend for a
    // funded in-swap whose Lightning payment attempt has terminally failed.
    rpc AuthorizeInSwapRefund (AuthorizeInSwapRefundRequest)
        returns (AuthorizeInSwapRefundResponse);

    // AcknowledgeOutSwapHtlc records that the receiver validated and durably
    // accepted the out-swap HTLC mailbox event. The swap server waits for this
    // acknowledgement before funding the Ark vHTLC.
    rpc AcknowledgeOutSwapHtlc (AcknowledgeOutSwapHtlcRequest)
        returns (AcknowledgeOutSwapHtlcResponse);
}

// RequestChannelIdRequest starts one Lightning-to-Ark receive negotiation.
message RequestChannelIdRequest {
    // expiry_seconds is the lifetime in seconds for which the allocated
    // channel ID remains valid.
    uint32 expiry_seconds = 1;

    // client_vhtlc_pubkey is the client's public key used in the vHTLC spend
    // paths.
    bytes client_vhtlc_pubkey = 2;

    // payment_hash is the invoice payment hash. The swap server combines it
    // with client_vhtlc_pubkey to derive a unique virtual channel ID without
    // adding a separate auth identity.
    bytes payment_hash = 3;

    // amount_msat is the exact amount the Ark receiver expects to receive,
    // expressed in millisatoshis. The swap server's out-swap fee is charged to
    // the Lightning payer through the route hint and does not reduce this
    // amount.
    uint64 amount_msat = 4;
}

// RequestChannelIdResponse returns the route hint for one receive negotiation.
message RequestChannelIdResponse {
    // route_hint contains the hop hint the client should embed in the invoice.
    RouteHint route_hint = 1;

    // payer_fee_msat is the quoted Lightning route fee paid by the sender for
    // the swap server's virtual hop. Callers that want a "payer pays" total
    // compute it as amount_msat plus payer_fee_msat.
    uint64 payer_fee_msat = 2;
}

// AcknowledgeOutSwapHtlcRequest confirms that the receiver has validated and
// durably accepted the out-swap HTLC notification for one receive invoice.
message AcknowledgeOutSwapHtlcRequest {
    // payment_hash identifies the intercepted HTLC.
    bytes payment_hash = 1;

    // client_vhtlc_pubkey is the receiver key used when the route was
    // registered. The server checks it against the persisted out-swap before
    // treating the acknowledgement as valid.
    bytes client_vhtlc_pubkey = 2;
}

// AcknowledgeOutSwapHtlcResponse is empty on success.
message AcknowledgeOutSwapHtlcResponse {
}

// OutSwapHtlcEvent describes one intercepted HTLC and the vHTLC terms the swap
// server will fund after the receiver acknowledges durable event acceptance.
// The event is intentionally raw from the Lightning side: the client must
// decode onion_blob with the invoice/auth private key before it claims the Ark
// vHTLC.
message OutSwapHtlcEvent {
    // payment_hash is the intercepted HTLC hash.
    bytes payment_hash = 1;

    // amount_sat is the whole-satoshi amount funded in the vHTLC.
    uint64 amount_sat = 2;

    // onion_blob is the raw next-hop onion blob delivered by LND.
    bytes onion_blob = 3;

    // vhtlc_config contains the virtual HTLC parameters the client should use
    // when constructing the expected output.
    VHTLCConfig vhtlc_config = 4;
}

// SwapMailboxEvent is the explicit event wrapper carried by swap mailbox
// envelopes.
message SwapMailboxEvent {
    oneof event {
        // out_swap_htlc is emitted when the server has accepted funding
        // responsibility for an out-swap HTLC.
        OutSwapHtlcEvent out_swap_htlc = 1;

        // in_ark_htlc is emitted when a same-Ark sender has funded or
        // accepted funding for a direct vHTLC.
        InArkHtlcEvent in_ark_htlc = 2;
    }
}

// InArkHtlcEvent describes one same-Ark vHTLC payment coordinated by the swap
// server. The event is intentionally not onion-shaped: the receiver validates
// the vHTLC script directly against the invoice payment hash and sender key.
message InArkHtlcEvent {
    // payment_hash is the invoice payment hash.
    bytes payment_hash = 1;

    // amount_sat is the whole-satoshi amount funded in the vHTLC.
    uint64 amount_sat = 2;

    // sender_pubkey is the payment sender's public key used in the vHTLC
    // refund paths.
    bytes sender_pubkey = 3;

    // vhtlc_config contains the virtual HTLC parameters the receiver should
    // use when constructing the expected output.
    VHTLCConfig vhtlc_config = 4;

    // vhtlc_outpoint is the observed funded vHTLC outpoint, when the server
    // knows it at notification time.
    string vhtlc_outpoint = 5;

    // vhtlc_amount_sat is the observed vHTLC amount in satoshis when known.
    uint64 vhtlc_amount_sat = 6;
}

// RouteHint describes one hop hint for a Lightning invoice route.
message RouteHint {
    // node_id is the compressed public key of the hinted hop.
    bytes node_id = 1;

    // channel_id is the short channel ID for this hop.
    uint64 channel_id = 2;

    // fee_base_msat is the hop's base fee in millisatoshis.
    uint64 fee_base_msat = 3;

    // fee_proportional_ppm is the hop's proportional fee rate in ppm.
    uint64 fee_proportional_ppm = 4;

    // cltv_expiry_delta is the hop's required CLTV delta.
    uint32 cltv_expiry_delta = 5;
}

// VHTLCConfig describes the timelocks and keys that define a vHTLC output.
message VHTLCConfig {
    // refund_locktime is the absolute block height after which the sender can
    // reclaim funds via the refund path.
    uint32 refund_locktime = 1;

    // unilateral_claim_delay is the CSV delay before the receiver can claim a
    // unilateral exit.
    uint32 unilateral_claim_delay = 2;

    // unilateral_refund_delay is the CSV delay before the sender can refund a
    // unilateral exit.
    uint32 unilateral_refund_delay = 3;

    // unilateral_refund_without_receiver_delay is the CSV delay before the
    // sender can refund without receiver cooperation.
    uint32 unilateral_refund_without_receiver_delay = 4;

    // swapserver_pubkey is the swap server's public key used in the vHTLC
    // spend paths.
    bytes swapserver_pubkey = 5;
}

// CreateInSwapRequest starts one Ark-to-Lightning swap.
message CreateInSwapRequest {
    // invoice is the BOLT-11 invoice the swap server should pay.
    string invoice = 1;

    // max_fee_sat is the maximum fee in satoshis the client accepts.
    uint64 max_fee_sat = 2;

    // client_vhtlc_pubkey is the client's public key used in the vHTLC spend
    // paths.
    bytes client_vhtlc_pubkey = 3;
}

// CreateInSwapResponse returns the negotiated parameters for one in-swap.
message CreateInSwapResponse {
    // payment_hash is the SHA-256 payment hash extracted from the invoice.
    bytes payment_hash = 1;

    // amount_sat is the total amount in satoshis locked in the swap.
    uint64 amount_sat = 2;

    // fee_sat is the fee in satoshis charged by the swap server.
    uint64 fee_sat = 3;

    // server_pubkey is the swap server's public key for this swap.
    bytes server_pubkey = 4;

    // vhtlc_config contains the negotiated virtual HTLC parameters.
    VHTLCConfig vhtlc_config = 5;

    // expiry is the wall-clock deadline by which the swap must complete.
    google.protobuf.Timestamp expiry = 6;

    // settlement_type identifies whether this negotiation should be completed
    // through Lightning or directly inside the Ark instance.
    SettlementType settlement_type = 7;
}

message AuthorizeInSwapRefundRequest {
    // payment_hash identifies the in-swap.
    bytes payment_hash = 1;

    // vhtlc_outpoint is the funded vHTLC outpoint in "txid:vout" format.
    string vhtlc_outpoint = 2;

    // vhtlc_amount_sat is the funded vHTLC amount.
    uint64 vhtlc_amount_sat = 3;

    // vhtlc_policy_template is the serialized vHTLC policy template.
    bytes vhtlc_policy_template = 4;

    // refund_spend_path is the serialized vHTLC Refund spend path.
    bytes refund_spend_path = 5;

    // checkpoint_psbt is the prepared custom OOR checkpoint PSBT to sign.
    bytes checkpoint_psbt = 6;
}

message AuthorizeInSwapRefundResponse {
    // signature is the swap server receiver key's tapscript signature.
    TaprootScriptSignature signature = 1;

    // failure_reason is the terminal Lightning payment failure that made the
    // refund safe to authorize.
    string failure_reason = 2;
}

// TaprootScriptSignature carries one externally produced tapscript signature.
// Keep this in sync with daemonrpc.TaprootScriptSignature.
message TaprootScriptSignature {
    // pubkey is the compressed public key that produced the signature.
    bytes pubkey = 1;

    // witness_script is the tapscript leaf this signature commits to.
    bytes witness_script = 2;

    // signature is the raw Schnorr signature, optionally followed by a one-byte
    // sighash type when the sighash is not SIGHASH_DEFAULT.
    bytes signature = 3;

    // sighash is the tapscript sighash type. Zero means SIGHASH_DEFAULT.
    uint32 sighash = 4;
}
