syntax = "proto3";

package swaprpc;

option go_package = "github.com/lightninglabs/wavelength/swaprpc";

import "google/protobuf/timestamp.proto";

// SettlementType identifies which settlement path backs a swap negotiation.
enum SettlementType {
    // SETTLEMENT_TYPE_UNSPECIFIED is accepted as Lightning for backward
    // compatibility with older responses.
    SETTLEMENT_TYPE_UNSPECIFIED = 0;

    // SETTLEMENT_TYPE_LIGHTNING means the swap server bridges to Lightning.
    SETTLEMENT_TYPE_LIGHTNING = 1;

    // SETTLEMENT_TYPE_IN_ARK means sender and receiver settle with one Ark
    // vHTLC inside the same Ark instance.
    SETTLEMENT_TYPE_IN_ARK = 2;

    // SETTLEMENT_TYPE_CREDIT means the swap server pays Lightning from a
    // reserved credit balance without requiring a client-funded vHTLC.
    SETTLEMENT_TYPE_CREDIT = 3;

    // SETTLEMENT_TYPE_MIXED means the invoice is funded by both a vHTLC and
    // a reserved credit balance.
    SETTLEMENT_TYPE_MIXED = 4;
}

// CreditFundingSource identifies how value enters a credit account.
enum CreditFundingSource {
    CREDIT_FUNDING_SOURCE_UNSPECIFIED = 0;
    CREDIT_FUNDING_SOURCE_LIGHTNING_RECEIVE = 1;
    CREDIT_FUNDING_SOURCE_ARK_TOPUP = 2;
}

// CreditOperationType identifies the durable credit state machine family.
enum CreditOperationType {
    CREDIT_OPERATION_TYPE_UNSPECIFIED = 0;
    CREDIT_OPERATION_TYPE_FUNDING = 1;
    CREDIT_OPERATION_TYPE_PAY = 2;
    CREDIT_OPERATION_TYPE_REDEMPTION = 3;
    CREDIT_OPERATION_TYPE_RECEIVE = 4;
}

// CreditOperationState is the externally visible state of one credit
// operation.
enum CreditOperationState {
    CREDIT_OPERATION_STATE_UNSPECIFIED = 0;
    CREDIT_OPERATION_STATE_CREATED = 1;
    CREDIT_OPERATION_STATE_AWAITING_PAYMENT = 2;
    CREDIT_OPERATION_STATE_CREDITED = 3;
    CREDIT_OPERATION_STATE_RESERVED = 4;
    CREDIT_OPERATION_STATE_PAYING_LIGHTNING = 5;
    CREDIT_OPERATION_STATE_DEBITED = 6;
    CREDIT_OPERATION_STATE_SENDING_OOR = 7;
    CREDIT_OPERATION_STATE_REDEEMED = 8;
    CREDIT_OPERATION_STATE_RELEASED = 9;
    CREDIT_OPERATION_STATE_EXPIRED = 10;
    CREDIT_OPERATION_STATE_FAILED = 11;
}

// SwapService exposes the external swap server API consumed by the client SDK.
service SwapService {
    // RequestChannelId asks the swap server to allocate a short channel ID and
    // return the route hint the client should use for one Lightning-to-Ark
    // receive flow.
    rpc RequestChannelId (RequestChannelIdRequest)
        returns (RequestChannelIdResponse);

    // CreateInSwap initiates an Ark-to-Lightning swap for the given invoice and
    // returns the negotiated vHTLC parameters.
    rpc CreateInSwap (CreateInSwapRequest) returns (CreateInSwapResponse);

    // QuoteInSwap previews how an invoice send would settle without creating
    // durable swap state or notifying a same-Ark receiver.
    rpc QuoteInSwap (QuoteInSwapRequest) returns (QuoteInSwapResponse);

    // CreateCredit creates a durable credit funding operation. Lightning
    // receives return a server-owned invoice; Ark top-ups return a
    // server-owned OOR destination.
    rpc CreateCredit (CreateCreditRequest) returns (CreateCreditResponse);

    // RedeemCredit materializes available credits back into an Ark OOR
    // output. The OOR output amount must be at least dust.
    rpc RedeemCredit (RedeemCreditRequest) returns (RedeemCreditResponse);

    // ListCredits returns the account balance plus recent credit operations
    // and ledger rows.
    rpc ListCredits (ListCreditsRequest) returns (ListCreditsResponse);

    // AuthorizeInSwapRefund signs a prepared cooperative refund spend for a
    // funded in-swap whose Lightning payment attempt has terminally failed.
    rpc AuthorizeInSwapRefund (AuthorizeInSwapRefundRequest)
        returns (AuthorizeInSwapRefundResponse);

    // AcknowledgeOutSwapHtlc records that the receiver validated and durably
    // accepted the out-swap HTLC mailbox event. The swap server waits for this
    // acknowledgement before funding the Ark vHTLC.
    rpc AcknowledgeOutSwapHtlc (AcknowledgeOutSwapHtlcRequest)
        returns (AcknowledgeOutSwapHtlcResponse);

    // SignInSwapForfeit asks the swap server to sign its participant share for
    // the exact connector-bound forfeit transaction of a funded in-swap vHTLC
    // refresh.
    rpc SignInSwapForfeit (SignInSwapForfeitRequest)
        returns (SignInSwapForfeitResponse);

    // SubmitOutSwapForfeitSignature submits the receiver's participant
    // signature for a connector-bound out-swap vHTLC refresh request that was
    // delivered through the receiver mailbox.
    rpc SubmitOutSwapForfeitSignature (SubmitOutSwapForfeitSignatureRequest)
        returns (SubmitOutSwapForfeitSignatureResponse);
}

// RequestChannelIdRequest starts one Lightning-to-Ark receive negotiation.
message RequestChannelIdRequest {
    // expiry_seconds is the lifetime in seconds for which the allocated
    // channel ID remains valid.
    uint32 expiry_seconds = 1;

    // client_vhtlc_pubkey is the client's public key used in the vHTLC spend
    // paths.
    bytes client_vhtlc_pubkey = 2;

    // payment_hash is the invoice payment hash. The swap server combines it
    // with client_vhtlc_pubkey to derive a unique virtual channel ID without
    // adding a separate auth identity.
    bytes payment_hash = 3;

    // amount_sat is the exact invoice amount the payer should send.
    uint64 amount_sat = 4;
}

// RequestChannelIdResponse returns the route hint paths for one receive
// negotiation.
message RequestChannelIdResponse {
    // Field 1 carried the single legacy route_hint_path before multi-path
    // hints landed in route_hint_paths.
    reserved 1;
    reserved "route_hint_path";

    // payer_fee_msat is the quoted Lightning route fee paid by the sender for
    // the swap server's virtual hop. Callers that want a "payer pays" total
    // compute it as amount_sat*1000 plus payer_fee_msat.
    uint64 payer_fee_msat = 2;

    // requested_amount_sat is the invoice amount requested by the receiver.
    uint64 requested_amount_sat = 3;

    // available_credit_sat is the credit balance considered for the receive
    // plan at route creation time.
    uint64 available_credit_sat = 4;

    // attached_credit_sat is the credit amount the server reserved and will
    // add to the funded vHTLC.
    uint64 attached_credit_sat = 5;

    // vhtlc_amount_sat is the Ark vHTLC output amount the client should
    // expect if this route is paid.
    uint64 vhtlc_amount_sat = 6;

    // dust_limit_sat is the minimum Ark vHTLC amount used for this decision.
    uint64 dust_limit_sat = 7;

    // settlement_type identifies whether the route is normal Lightning or
    // credit-assisted.
    SettlementType settlement_type = 8;

    // route_hint_paths contains every alternative private path the client
    // should embed in the invoice, one BOLT-11 "r" field per path. The last
    // hop of every path is the swap server's virtual channel. When the swap
    // server fronts multiple Lightning backends, each path routes through a
    // different backend node into the same virtual channel, so the sender's
    // pathfinding can pick whichever backend is reachable.
    repeated RouteHintPath route_hint_paths = 9;
}

// AcknowledgeOutSwapHtlcRequest confirms that the receiver has validated and
// durably accepted the out-swap HTLC notification for one receive invoice.
message AcknowledgeOutSwapHtlcRequest {
    // payment_hash identifies the intercepted HTLC.
    bytes payment_hash = 1;

    // client_vhtlc_pubkey is the receiver key used when the route was
    // registered. The server checks it against the persisted out-swap before
    // treating the acknowledgement as valid.
    bytes client_vhtlc_pubkey = 2;
}

// AcknowledgeOutSwapHtlcResponse is empty on success.
message AcknowledgeOutSwapHtlcResponse {
}

// OutSwapHtlcEvent describes one intercepted HTLC and the vHTLC terms the swap
// server will fund after the receiver acknowledges durable event acceptance.
// The event is intentionally raw from the Lightning side: the client must
// decode onion_blob with the invoice/auth private key before it claims the Ark
// vHTLC.
message OutSwapHtlcEvent {
    // payment_hash is the intercepted HTLC hash.
    bytes payment_hash = 1;

    // amount_sat is the sat-denominated amount funded in the vHTLC.
    uint64 amount_sat = 2;

    // onion_blob is the raw next-hop onion blob delivered by LND.
    bytes onion_blob = 3;

    // vhtlc_config contains the virtual HTLC parameters the client should use
    // when constructing the expected output.
    VHTLCConfig vhtlc_config = 4;

    // parts lists the individual HTLC shards that make up a multi-part
    // payment set. When empty the event describes a legacy single-part
    // payment carried by onion_blob. When populated, amount_sat is still
    // the sat-denominated total funded in the vHTLC and onion_blob mirrors
    // the first part for backwards compatibility.
    repeated OutSwapHtlcPart parts = 5;

    // requested_amount_sat is the Lightning invoice amount paid by the payer.
    uint64 requested_amount_sat = 6;

    // attached_credit_sat is the reserved credit amount added to the vHTLC.
    uint64 attached_credit_sat = 7;
}

// OutSwapHtlcPart describes one HTLC shard of a multi-part out-swap payment
// set. Each part carries its own onion blob that the client must decode and
// validate before acknowledging the event.
message OutSwapHtlcPart {
    // amount_msat is the millisatoshi amount forwarded to the receiver by
    // this shard.
    uint64 amount_msat = 1;

    // onion_blob is the raw next-hop onion blob delivered by LND for this
    // shard.
    bytes onion_blob = 2;
}

// SwapMailboxEvent is the explicit event wrapper carried by swap mailbox
// envelopes.
message SwapMailboxEvent {
    oneof event {
        // out_swap_htlc is emitted when the server has accepted funding
        // responsibility for an out-swap HTLC.
        OutSwapHtlcEvent out_swap_htlc = 1;

        // in_ark_htlc is emitted when a same-Ark sender has funded or
        // accepted funding for a direct vHTLC.
        InArkHtlcEvent in_ark_htlc = 2;

        // out_swap_forfeit_signature_request asks the receiver to sign its
        // participant share for an exact connector-bound out-swap vHTLC
        // refresh forfeit transaction.
        OutSwapForfeitSignatureRequest out_swap_forfeit_signature_request = 3;
    }
}

// InArkHtlcEvent describes one same-Ark vHTLC payment coordinated by the swap
// server. The event is intentionally not onion-shaped: the receiver validates
// the vHTLC script directly against the invoice payment hash and sender key.
message InArkHtlcEvent {
    // payment_hash is the invoice payment hash.
    bytes payment_hash = 1;

    // amount_sat is the sat-denominated amount funded in the vHTLC.
    uint64 amount_sat = 2;

    // sender_pubkey is the payment sender's public key used in the vHTLC
    // refund paths.
    bytes sender_pubkey = 3;

    // vhtlc_config contains the virtual HTLC parameters the receiver should
    // use when constructing the expected output.
    VHTLCConfig vhtlc_config = 4;

    // vhtlc_outpoint is the observed funded vHTLC outpoint, when the server
    // knows it at notification time.
    string vhtlc_outpoint = 5;

    // vhtlc_amount_sat is the observed vHTLC amount in satoshis when known.
    uint64 vhtlc_amount_sat = 6;
}

// RouteHint describes one hop hint for a Lightning invoice route.
message RouteHint {
    // node_id is the compressed public key of the hinted hop.
    bytes node_id = 1;

    // channel_id is the short channel ID for this hop.
    uint64 channel_id = 2;

    // fee_base_msat is the hop's base fee in millisatoshis.
    uint64 fee_base_msat = 3;

    // fee_proportional_ppm is the hop's proportional fee rate in ppm.
    uint64 fee_proportional_ppm = 4;

    // cltv_expiry_delta is the hop's required CLTV delta.
    uint32 cltv_expiry_delta = 5;
}

// RouteHintPath is one ordered private path of hop hints. Multiple paths in
// a response are alternatives: each becomes its own BOLT-11 "r" field so the
// sender can route through any of them.
message RouteHintPath {
    // hops is the ordered hop list from the first hinted node to the virtual
    // channel terminating at the swap server.
    repeated RouteHint hops = 1;
}

// VHTLCConfig describes the timelocks and keys that define a vHTLC output.
message VHTLCConfig {
    // refund_locktime is the absolute block height after which the sender can
    // reclaim funds via the refund path.
    uint32 refund_locktime = 1;

    // unilateral_claim_delay is the CSV delay before the receiver can claim a
    // unilateral exit.
    uint32 unilateral_claim_delay = 2;

    // unilateral_refund_delay is the CSV delay before the sender can refund a
    // unilateral exit.
    uint32 unilateral_refund_delay = 3;

    // unilateral_refund_without_receiver_delay is the CSV delay before the
    // sender can refund without receiver cooperation.
    uint32 unilateral_refund_without_receiver_delay = 4;

    // swapserver_pubkey is the swap server's public key used in the vHTLC
    // spend paths.
    bytes swapserver_pubkey = 5;
}

// CreateInSwapRequest starts one Ark-to-Lightning swap.
message CreateInSwapRequest {
    // invoice is the BOLT-11 invoice the swap server should pay.
    string invoice = 1;

    // max_fee_sat is the maximum fee in satoshis the client accepts.
    uint64 max_fee_sat = 2;

    // client_vhtlc_pubkey is the client's public key used in the vHTLC spend
    // paths.
    bytes client_vhtlc_pubkey = 3;

    // account_pubkey identifies the wallet credit account to inspect or
    // reserve from when credit funding is allowed.
    bytes account_pubkey = 4;

    // max_credit_sat is the maximum credit amount the caller authorizes this
    // payment to reserve. Zero means credit use is not allowed.
    uint64 max_credit_sat = 5;
}

// CreateInSwapResponse returns the negotiated parameters for one in-swap.
message CreateInSwapResponse {
    // payment_hash is the SHA-256 payment hash extracted from the invoice.
    bytes payment_hash = 1;

    // amount_sat is the total amount in satoshis locked in the swap.
    uint64 amount_sat = 2;

    // fee_sat is the fee in satoshis charged by the swap server.
    uint64 fee_sat = 3;

    // server_pubkey is the swap server's public key for this swap.
    bytes server_pubkey = 4;

    // vhtlc_config contains the negotiated virtual HTLC parameters.
    VHTLCConfig vhtlc_config = 5;

    // expiry is the wall-clock deadline by which the swap must complete.
    google.protobuf.Timestamp expiry = 6;

    // settlement_type identifies whether this negotiation should be completed
    // through Lightning or directly inside the Ark instance.
    SettlementType settlement_type = 7;

    // credit_quote describes any credit reservation attached to this pay.
    CreditQuote credit_quote = 8;

    // preimage is set for credit-only pays after the swap server has already
    // paid the Lightning invoice from reserved credits.
    bytes preimage = 9;
}

// QuoteInSwapRequest previews one Ark-to-Lightning invoice send.
message QuoteInSwapRequest {
    // invoice is the BOLT-11 invoice the swap server should inspect.
    string invoice = 1;

    // max_fee_sat is the caller's fee cap. Quotes still return when the
    // computed server fee exceeds this cap so callers can render the fee.
    uint64 max_fee_sat = 2;

    // account_pubkey identifies the wallet credit account to inspect. Empty
    // means the quote ignores credits.
    bytes account_pubkey = 3;

    // max_credit_sat is the maximum credit amount the caller is willing to
    // use. Zero means the quote reports whether credits are required but does
    // not apply optional credits.
    uint64 max_credit_sat = 4;
}

// QuoteInSwapResponse returns the non-binding preview for one invoice send.
message QuoteInSwapResponse {
    // payment_hash is the SHA-256 payment hash extracted from the invoice.
    bytes payment_hash = 1;

    // invoice_amount_sat is the sat-denominated amount requested by the
    // invoice.
    uint64 invoice_amount_sat = 2;

    // amount_sat is the total amount that would be locked in the vHTLC.
    uint64 amount_sat = 3;

    // fee_sat is the fee in satoshis charged by the swap server.
    uint64 fee_sat = 4;

    // settlement_type identifies whether the invoice would settle through
    // Lightning or directly inside the Ark instance.
    SettlementType settlement_type = 5;

    // expiry is the wall-clock deadline after which the quote is stale.
    google.protobuf.Timestamp expiry = 6;

    // exceeds_max_fee is true when max_fee_sat is non-zero and fee_sat is
    // larger than that cap.
    bool exceeds_max_fee = 7;

    // credit_quote describes how credits would be used for this invoice.
    CreditQuote credit_quote = 8;
}

// CreditQuote describes the credit component of a pay quote.
message CreditQuote {
    // must_use_credit is true when the invoice amount cannot be represented by
    // the normal vHTLC path.
    bool must_use_credit = 1;

    // credit_applied_sat is the credit amount the quote expects to reserve.
    uint64 credit_applied_sat = 2;

    // credit_shortfall_sat is the additional credit needed before this
    // payment can be admitted.
    uint64 credit_shortfall_sat = 3;

    // credit_topup_sat is the Ark top-up amount required to cover the
    // shortfall. It is rounded up and dust-limited by the server.
    uint64 credit_topup_sat = 4;

    // ark_funding_sat is the amount the client must still fund through the
    // normal vHTLC path.
    uint64 ark_funding_sat = 5;
}

message CreateCreditRequest {
    // account_pubkey identifies the wallet credit account.
    bytes account_pubkey = 1;

    // idempotency_key identifies one caller intent across retries.
    string idempotency_key = 2;

    CreditFundingSource source = 3;

    // amount_sat is the credit amount to create.
    uint64 amount_sat = 4;

    // memo is embedded into server-owned Lightning receive invoices when the
    // source is LIGHTNING_RECEIVE.
    string memo = 5;
}

message CreateCreditResponse {
    string operation_id = 1;
    CreditOperationState state = 2;

    // invoice is set for LIGHTNING_RECEIVE credit funding.
    string invoice = 3;

    // payment_hash is set when an invoice-backed operation exists.
    bytes payment_hash = 4;

    // amount_sat is the sat amount that will be credited when complete.
    uint64 amount_sat = 5;

    // destination_pubkey is the server-owned x-only Ark recipient pubkey for
    // ARK_TOPUP.
    bytes destination_pubkey = 7;

    google.protobuf.Timestamp expires_at = 8;
}

message RedeemCreditRequest {
    bytes account_pubkey = 1;
    string idempotency_key = 2;
    uint64 amount_sat = 3;
    bytes destination_pubkey = 4;
}

message RedeemCreditResponse {
    string operation_id = 1;
    CreditOperationState state = 2;
    uint64 debited_sat = 3;
    uint64 redeemed_sat = 4;
    string session_id = 5;
}

message ListCreditsRequest {
    bytes account_pubkey = 1;
    uint32 limit = 2;
}

message ListCreditsResponse {
    uint64 finalized_sat = 1;
    uint64 reserved_sat = 2;
    uint64 available_sat = 3;
    repeated CreditOperation operations = 4;
    repeated CreditLedgerEntry ledger_entries = 5;
}

message CreditOperation {
    string operation_id = 1;
    CreditOperationType type = 2;
    CreditOperationState state = 3;
    uint64 amount_sat = 4;
    bytes payment_hash = 6;
    string invoice = 7;
    bytes destination_pubkey = 8;
    string session_id = 9;
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp completed_at = 12;
    string last_error = 13;
}

message CreditLedgerEntry {
    string entry_id = 1;
    string operation_id = 2;
    string direction = 3;
    uint64 amount_sat = 4;
    google.protobuf.Timestamp created_at = 5;
}

message AuthorizeInSwapRefundRequest {
    // payment_hash identifies the in-swap.
    bytes payment_hash = 1;

    // vhtlc_outpoint is the funded vHTLC outpoint in "txid:vout" format.
    string vhtlc_outpoint = 2;

    // vhtlc_amount_sat is the funded vHTLC amount.
    uint64 vhtlc_amount_sat = 3;

    // vhtlc_policy_template is the serialized vHTLC policy template.
    bytes vhtlc_policy_template = 4;

    // refund_spend_path is the serialized vHTLC Refund spend path.
    bytes refund_spend_path = 5;

    // checkpoint_psbt is the prepared custom OOR checkpoint PSBT to sign.
    bytes checkpoint_psbt = 6;
}

message AuthorizeInSwapRefundResponse {
    // signature is the swap server receiver key's tapscript signature.
    TaprootScriptSignature signature = 1;

    // failure_reason is the terminal Lightning payment failure that made the
    // refund safe to authorize.
    string failure_reason = 2;
}

// ForfeitSignaturePayload is the exact transcript one vHTLC refresh
// participant signs after an Ark round assigns connector outputs.
message ForfeitSignaturePayload {
    // request_id is a stable idempotency key for this exact signing request.
    bytes request_id = 1;

    // payment_hash identifies the swap that owns the vHTLC.
    bytes payment_hash = 2;

    // vhtlc_outpoint is the vHTLC outpoint in "txid:vout" format.
    string vhtlc_outpoint = 3;

    // vhtlc_amount_sat is the value of the vHTLC output being forfeited.
    uint64 vhtlc_amount_sat = 4;

    // vhtlc_pk_script is the concrete taproot output script being spent.
    bytes vhtlc_pk_script = 5;

    // vhtlc_policy_template is the semantic vHTLC policy template.
    bytes vhtlc_policy_template = 6;

    // forfeit_spend_path is the serialized connector-backed vHTLC spend path.
    bytes forfeit_spend_path = 7;

    // unsigned_forfeit_tx is the exact serialized transaction to sign.
    bytes unsigned_forfeit_tx = 8;

    // connector_outpoint identifies the round connector input.
    string connector_outpoint = 9;

    // connector_amount_sat is the value of the connector output being spent.
    uint64 connector_amount_sat = 10;

    // connector_pk_script is the connector output script being spent.
    bytes connector_pk_script = 11;

    // server_forfeit_pk_script is the expected operator penalty output script.
    bytes server_forfeit_pk_script = 12;
}

// ForfeitParticipantSignature carries one participant signature for the exact
// transaction in ForfeitSignaturePayload.
message ForfeitParticipantSignature {
    // pubkey is the compressed public key that produced the signature.
    bytes pubkey = 1;

    // signature is the raw 64-byte Schnorr signature.
    bytes signature = 2;
}

message SignInSwapForfeitRequest {
    // payload is the exact transcript the server validates and signs.
    ForfeitSignaturePayload payload = 1;
}

message SignInSwapForfeitResponse {
    // signature is the swap server's participant signature.
    ForfeitParticipantSignature signature = 1;
}

message OutSwapForfeitSignatureRequest {
    // payload is the exact transcript the receiver must validate and sign.
    ForfeitSignaturePayload payload = 1;
}

message SubmitOutSwapForfeitSignatureRequest {
    // payload is echoed so the server can validate idempotency and the exact
    // transcript the receiver signed.
    ForfeitSignaturePayload payload = 1;

    // signature is the receiver's participant signature.
    ForfeitParticipantSignature signature = 2;
}

message SubmitOutSwapForfeitSignatureResponse {
}

// TaprootScriptSignature carries one externally produced tapscript signature.
// Keep this in sync with waverpc.TaprootScriptSignature.
message TaprootScriptSignature {
    // pubkey is the compressed public key that produced the signature.
    bytes pubkey = 1;

    // witness_script is the tapscript leaf this signature commits to.
    bytes witness_script = 2;

    // signature is the raw Schnorr signature, optionally followed by a one-byte
    // sighash type when the sighash is not SIGHASH_DEFAULT.
    bytes signature = 3;

    // sighash is the tapscript sighash type. Zero means SIGHASH_DEFAULT.
    uint32 sighash = 4;
}
