type: google.api.Service
config_version: 3

http:
  rules:
    - selector: swaprpc.SwapService.RequestChannelId
      post: /v1/swap/request-channel-id
      body: "*"
    - selector: swaprpc.SwapService.CreateInSwap
      post: /v1/swap/create-in-swap
      body: "*"
    - selector: swaprpc.SwapService.QuoteInSwap
      post: /v1/swap/quote-in-swap
      body: "*"
    - selector: swaprpc.SwapService.AuthorizeInSwapRefund
      post: /v1/swap/authorize-in-swap-refund
      body: "*"
    - selector: swaprpc.SwapService.AcknowledgeOutSwapHtlc
      post: /v1/swap/acknowledge-out-swap-htlc
      body: "*"
    - selector: swaprpc.SwapService.SignInSwapForfeit
      post: /v1/swap/sign-in-swap-forfeit
      body: "*"
    - selector: swaprpc.SwapService.SubmitOutSwapForfeitSignature
      post: /v1/swap/submit-out-swap-forfeit-signature
      body: "*"
