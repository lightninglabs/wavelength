syntax = "proto3";

package arkrpc;

option go_package = "github.com/lightninglabs/darepo-client/arkrpc";

service ArkService {
    // GetInfo returns basic information about the ark server
    rpc GetInfo (GetInfoRequest) returns (GetInfoResponse);

    // EstimateFee returns a fee breakdown for a given VTXO amount,
    // showing liquidity cost, on-chain share, margin, and minimum
    // viable VTXO at current rates and utilization.
    rpc EstimateFee (EstimateFeeRequest) returns (EstimateFeeResponse);
}

message GetInfoRequest {
}

message GetInfoResponse {
    // The version of the protocol that the operator is running.
    string version = 1;

    // The ark operator's main public key. This pub key must be used in the
    // construction of boarding scripts.
    bytes pubkey = 2;

    // The network the operator is running on.
    string network = 3;

    // The current block height tip that the operator is aware of.
    uint32 block_height = 4;

    // The minimum CSV delay (blocks) required on boarding outputs.
    uint32 boarding_exit_delay = 5;

    // The minimum CSV delay (blocks) for VTXO unilateral exit paths.
    uint32 vtxo_exit_delay = 6;

    // The output script that clients must use for the penalty output in
    // forfeit transactions.
    bytes forfeit_script = 7;

    // The operator key used in VTXO sweep paths.
    bytes sweep_key = 8;

    // The batch-wide absolute timelock (blocks) for sweep transactions.
    uint32 sweep_delay = 9;

    // The minimum output value (satoshis) enforced for boarding/funding
    // flows.
    int64 dust_limit = 10;

    // The minimum amount (satoshis) clients must contribute per boarding
    // input.
    int64 min_boarding_amount = 11;

    // The maximum amount (satoshis) accepted per boarding request. Zero
    // means no cap.
    int64 max_boarding_amount = 12;

    // The operator's target package feerate (sat/vByte).
    int64 fee_rate = 13;

    // The minimum confirmations required on boarding inputs.
    uint32 min_confirmations = 14;

    // The minimum operator fee (satoshis) required per join request. The
    // fee is the difference between total input value and total output
    // value. Requests below this threshold are rejected.
    int64 min_operator_fee = 15;

    // The annual cost-of-capital rate used for liquidity fee
    // computation (e.g. 0.05 for 5%).
    double annual_rate = 16;

    // The fixed operator margin (satoshis) per liquidity-requiring
    // operation.
    int64 base_margin_sat = 17;

    // The maximum cumulative on-chain virtual bytes the operator will
    // accept across the resolved input lineage of an OOR submit. Submits
    // whose summed unique-by-txid signed-tx vbytes (every tree node and
    // OOR ancestor tx required to claim the produced VTXO unilaterally)
    // exceed this cap are rejected with a typed
    // OOR_REJECT_LINEAGE_TOO_LARGE error code. Clients should mirror this
    // cap pre-submit to avoid round-trip rejections; a value of 0 means
    // the operator does not enforce a cap.
    uint32 max_oor_lineage_vbytes = 18;
}

// EstimateFeeRequest asks the server to estimate the fee for a
// VTXO operation at current rates and utilization.
message EstimateFeeRequest {
    // amount_sat is the VTXO amount to estimate fees for.
    int64 amount_sat = 1;

    // is_boarding indicates whether this is a new boarding (true)
    // or a refresh/forfeit (false).
    bool is_boarding = 2;

    // remaining_blocks is the remaining lifetime of the forfeited
    // VTXO in blocks. Only used when is_boarding is false.
    uint32 remaining_blocks = 3;
}

// EstimateFeeResponse contains the itemized fee breakdown.
message EstimateFeeResponse {
    // liquidity_fee_sat is the time-value-of-money component.
    int64 liquidity_fee_sat = 1;

    // onchain_share_sat is the per-participant on-chain cost.
    int64 onchain_share_sat = 2;

    // margin_sat is the fixed operator margin.
    int64 margin_sat = 3;

    // total_fee_sat is the sum of all components.
    int64 total_fee_sat = 4;

    // effective_annual_rate is the rate after utilization spread.
    double effective_annual_rate = 5;

    // min_viable_amount_sat is the minimum VTXO amount that is
    // economically viable at current rates.
    int64 min_viable_amount_sat = 6;

    // below_dust_warning is true when the requested amount is
    // below the minimum viable threshold. Automated callers
    // MUST check this field before acting on the fee estimate:
    // a VTXO below the minimum viable amount is uneconomic to
    // exit (miner fees exceed the VTXO value) and should be
    // rejected client-side rather than paid for.
    bool below_dust_warning = 7;
}
