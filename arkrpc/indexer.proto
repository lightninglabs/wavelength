syntax = "proto3";

package arkrpc;

option go_package = "github.com/lightninglabs/darepo-client/arkrpc";

// IndexerService is a wallet-facing query + notification facade over operator
// state. It is intended to be transported over MailboxRPC (RPC-over-mailbox),
// not exposed as a public explorer.
service IndexerService {
    // RegisterReceiveScript binds a receive script (pkScript) to the
    // authenticated mailbox principal so the operator can route incoming OOR
    // notifications to the correct mailbox.
    rpc RegisterReceiveScript (RegisterReceiveScriptRequest)
        returns (RegisterReceiveScriptResponse);

    // ListMyReceiveScripts lists receive scripts currently registered to the
    // caller's principal.
    rpc ListMyReceiveScripts (ListMyReceiveScriptsRequest)
        returns (ListMyReceiveScriptsResponse);

    // UnregisterReceiveScript removes a script registration for the caller's
    // principal.
    rpc UnregisterReceiveScript (UnregisterReceiveScriptRequest)
        returns (UnregisterReceiveScriptResponse);

    // ListOORRecipientEventsByScript is an optional "offline receive" feature:
    // list incoming OOR recipient events for a pkScript without prior
    // registration, gated by a proof-of-control for that pkScript.
    rpc ListOORRecipientEventsByScript (ListOORRecipientEventsByScriptRequest)
        returns (ListOORRecipientEventsByScriptResponse);

    // ListVTXOsByScripts returns the authoritative VTXO set matching the
    // provided scripts, gated by a proof-of-control for each script.
    //
    // This is the primary "wallet inventory" query surface.
    rpc ListVTXOsByScripts (ListVTXOsByScriptsRequest)
        returns (ListVTXOsByScriptsResponse);

    // GetOORSessionByTxid returns the Ark package and finalized checkpoint
    // PSBTs for an OOR session identified by its deterministic txid, gated by
    // proof-of-control for a script that the session consumed.
    rpc GetOORSessionByTxid (GetOORSessionByTxidRequest)
        returns (GetOORSessionByTxidResponse);

    // GetSubtreeByScripts returns a minimal spanning subtree containing all
    // VTXO leaves matching the provided scripts and the intermediate nodes
    // needed to connect them.
    //
    // The returned subtree is intended to avoid redundant per-VTXO path
    // duplication when a wallet controls multiple leaves in the same tree.
    rpc GetSubtreeByScripts (GetSubtreeByScriptsRequest)
        returns (GetSubtreeByScriptsResponse);

    // ListVTXOEventsByScripts returns a monotonic change feed for VTXOs
    // matching the provided scripts, gated by proof-of-control.
    //
    // Wallets can use this to catch up after being offline and to reconcile
    // local state deterministically.
    rpc ListVTXOEventsByScripts (ListVTXOEventsByScriptsRequest)
        returns (ListVTXOEventsByScriptsResponse);
}

message RegisterReceiveScriptRequest {
    bytes pk_script = 1;

    // expires_at_unix_s controls server-side retention of this registration.
    // If unset (0), server default policy applies.
    uint64 expires_at_unix_s = 2;

    // label is informational and can be used by clients for debugging.
    string label = 3;

    oneof proof {
        // taproot_schnorr proves control of the P2TR output key.
        TaprootSchnorrProof taproot_schnorr = 10;

        // bip322 is reserved for future BIP-322 script-satisfaction proofs.
        BIP322Proof bip322 = 11;
    }
}

message TaprootSchnorrProof {
    // message is the canonical TLV-encoded proof message the signature
    // commits to. The wire format uses base64 encoding for REST/JSON
    // transport.
    bytes message = 1;

    // sig64 is a 64-byte BIP-340 schnorr signature over the BIP-340
    // tagged hash of message: sha256(sha256(tag) || sha256(tag) || msg),
    // where tag = "darepo/indexer/v1".
    bytes sig64 = 2;
}

// TODO(indexer): BIP322Proof is defined for forward-compatibility but
// not yet implemented by any client. Callers must use TaprootSchnorrProof
// until BIP-322 script-satisfaction support is added.
message BIP322Proof {
    // message is the canonical JSON message the signature commits to.
    string message = 1;

    // signature_b64 is a base64-encoded consensus transaction as produced by
    // a BIP-322 proof.
    string signature_b64 = 2;
}

message RegisterReceiveScriptResponse {
}

message UnregisterReceiveScriptRequest {
    bytes pk_script = 1;

    oneof proof {
        // taproot_schnorr proves control of the P2TR output key.
        TaprootSchnorrProof taproot_schnorr = 10;

        // bip322 is reserved for future BIP-322 script-satisfaction
        // proofs.
        BIP322Proof bip322 = 11;
    }
}

message ListMyReceiveScriptsRequest {
}

message ListMyReceiveScriptsResponse {
    repeated RegisteredReceiveScript scripts = 1;
}

message RegisteredReceiveScript {
    bytes pk_script = 1;
    uint64 expires_at_unix_s = 2;
    string label = 3;
}

message UnregisterReceiveScriptResponse {
}

// ListOORRecipientEventsByScriptRequest is Phase 1 of the three-phase
// incoming OOR receive flow. After a lightweight IncomingOOREvent
// notification wakes the client, the client issues this query to fetch
// the full OOR package data (Ark PSBT + checkpoint PSBTs) needed to
// construct IncomingTransferEvent in the OOR FSM.
message ListOORRecipientEventsByScriptRequest {
    bytes pk_script = 1;
    uint64 after_event_id = 2;
    uint32 limit = 3;

    oneof proof {
        TaprootSchnorrProof taproot_schnorr = 10;
        BIP322Proof bip322 = 11;
    }
}

message ListOORRecipientEventsByScriptResponse {
    repeated OORRecipientEvent events = 1;
    uint64 next_cursor = 2;
}

// OORRecipientEvent is returned by ListOORRecipientEventsByScript (Phase 1
// query response). It carries the full Ark PSBT and checkpoint data that
// the lightweight IncomingOOREvent notification intentionally omits.
message OORRecipientEvent {
    bytes recipient_pk_script = 1;
    uint64 event_id = 2;
    bytes session_id = 3;
    uint32 output_index = 4;
    uint64 value = 5;

    // ark_psbt is the serialized Ark PSBT for this OOR session. The
    // client needs this to materialize the received VTXO via the
    // IncomingTransferEvent in the OOR FSM.
    bytes ark_psbt = 6;

    // checkpoint_psbts are the finalized checkpoint PSBTs for the
    // session. These provide lineage and unroll proof data for the
    // materialized VTXO.
    repeated bytes checkpoint_psbts = 7;

    // ancestor_packages are finalized OOR packages that produced OOR inputs
    // consumed by this session, ordered from farthest ancestor to nearest.
    // Recipients persist these artifacts so a chained OOR VTXO can be
    // unrolled without querying package data for VTXOs they do not own.
    repeated OORSessionPackage ancestor_packages = 8;

    // vtxo_policy_template is the semantic arkscript policy template for this
    // recipient output. Older servers may omit it, in which case clients fall
    // back to standard VTXO materialization.
    bytes vtxo_policy_template = 9;
}

// OORSessionPackage carries finalized package artifacts for one OOR session.
message OORSessionPackage {
    // session_id is the deterministic Ark txid for this package.
    bytes session_id = 1;

    // ark_psbt is the serialized Ark PSBT for this package.
    bytes ark_psbt = 2;

    // checkpoint_psbts are the finalized checkpoint PSBTs for this package.
    repeated bytes checkpoint_psbts = 3;
}

// IncomingOOREvent is a lightweight notification delivered as a mailbox EVENT
// envelope. It acts as a durable wake-up hint that triggers the three-phase
// incoming receive flow:
//
//   Phase 0 (notification): IncomingOOREvent arrives with session_id,
//     pk_script, and event_id. No PSBTs or metadata; just enough to
//     identify the transfer and persist a durable resolve request.
//
//   Phase 1 (package query): Client issues ListOORRecipientEventsByScript
//     to fetch the full Ark PSBT + checkpoint PSBTs from the indexer.
//
//   Phase 2 (metadata query): Client issues ListVTXOsByScripts to fetch
//     authoritative VTXO lineage metadata (round_id, commitment_txid,
//     tree_path, batch_expiry, chain_depth) for materialization.
//
// Each phase boundary is a durable message, so the flow survives actor
// restarts without re-issuing queries or losing state.
message IncomingOOREvent {
    bytes recipient_pk_script = 1;
    uint64 recipient_event_id = 2;
    bytes session_id = 3;
    uint32 output_index = 4;
    uint64 value = 5;
}

// OutPoint identifies an output of a Bitcoin transaction.
//
// txid is the raw 32-byte transaction id.
message OutPoint {
    bytes txid = 1;
    uint32 vout = 2;
}

// TxOut represents a Bitcoin transaction output.
message TxOut {
    // value is the output amount in satoshis.
    int64 value = 1;

    // pk_script is the output script (scriptPubKey).
    bytes pk_script = 2;
}

// TreePathNode represents a single node in a VTXO tree path. Each node
// corresponds to one transaction in the commitment lineage from root to leaf.
message TreePathNode {
    // input is the outpoint this transaction spends.
    OutPoint input = 1;

    // outputs are all the outputs created by this transaction.
    repeated TxOut outputs = 2;

    // co_signers are the compressed public keys (33 bytes each) that must
    // participate in MuSig2 signing for this node's input.
    repeated bytes co_signers = 3;

    // children maps output index to the index of the child TreePathNode in
    // the parent TreePath's flattened nodes array.
    map<uint32, uint32> children = 4;

    // amount is the total BTC value (satoshis) for this node.
    int64 amount = 5;

    // signature is the final aggregated MuSig2 schnorr signature (64 bytes)
    // for the input. Empty if unsigned.
    bytes signature = 6;
}

// TreePath is the minimal extracted VTXO tree path from root to a client's
// leaf, required for unilateral exit of the underlying commitment lineage.
message TreePath {
    // nodes is the pre-order flattened list of tree nodes. Index 0 is the
    // root.
    repeated TreePathNode nodes = 1;

    // batch_outpoint is the outpoint in the commitment transaction that the
    // root transaction spends.
    OutPoint batch_outpoint = 2;

    // batch_output is the actual output at batch_outpoint.
    TxOut batch_output = 3;

    // sweep_tapscript_root is the tapscript root hash for tweaking branch
    // outputs. Empty for connector trees.
    bytes sweep_tapscript_root = 4;
}

// AncestryPath describes one rooted VTXO tree fragment that contributes
// ancestry to a VTXO. A round-direct VTXO has exactly one AncestryPath. An
// OOR VTXO whose ancestry spans multiple commitment txs (cross-round
// multi-input Ark spend) has one AncestryPath per distinct commitment.
message AncestryPath {
    // tree_path is the extracted commitment-tree path from the batch root to
    // the input VTXO leaf in the round identified by commitment_txid.
    TreePath tree_path = 1;

    // commitment_txid is the txid of the commitment tx anchoring this tree
    // fragment. Distinct AncestryPaths within a single VTXO must have
    // distinct commitment_txids.
    bytes commitment_txid = 2;

    // input_indices lists the Ark tx input indices (within the OOR Ark tx
    // that produced the VTXO) that this tree fragment serves. The unroller
    // uses this mapping to determine which checkpoints/inputs each
    // ancestry tree feeds without recomputing outpoint matches. Empty for
    // round-direct VTXOs.
    repeated uint32 input_indices = 3;

    // tree_depth is the depth of the served leaf within this fragment's
    // tree. Worst-case unilateral-exit timing for the produced VTXO is
    // max(tree_depth) across all AncestryPaths.
    uint32 tree_depth = 4;

    // commitment_height is the on-chain confirmation height of the commitment
    // tx anchoring this fragment. Zero means unknown (legacy/unconfirmed),
    // in which case the client falls back to a bounded lookback floor.
    int32 commitment_height = 5;
}

// ScriptScope selects a pkScript and carries a proof-of-control for that
// script.
//
// Proofs MUST commit to pk_script and should also commit to:
//   - server_id (operator instance),
//   - principal (mailbox id),
//   - purpose (RPC method or event stream),
//   - expiry (replay window bound), and
//   - nonce (uniqueness).
message ScriptScope {
    bytes pk_script = 1;

    oneof proof {
        TaprootSchnorrProof taproot_schnorr = 10;
        BIP322Proof bip322 = 11;
    }
}

// VTXOStatus is the lifecycle status of a VTXO.
enum VTXOStatus {
    VTXO_STATUS_UNSPECIFIED = 0;

    // VTXO_STATUS_UNCONFIRMED indicates the VTXO exists but is not yet
    // confirmed on-chain (commitment not confirmed).
    VTXO_STATUS_UNCONFIRMED = 1;

    // VTXO_STATUS_LIVE indicates the VTXO is active and can be spent.
    VTXO_STATUS_LIVE = 2;

    // VTXO_STATUS_PENDING_FORFEIT indicates the VTXO has been committed
    // to cooperative consumption and is awaiting forfeit details.
    VTXO_STATUS_PENDING_FORFEIT = 3;

    // VTXO_STATUS_FORFEITING indicates the VTXO is being forfeited in a
    // round.
    VTXO_STATUS_FORFEITING = 4;

    // VTXO_STATUS_FORFEITED indicates the VTXO has been forfeited (terminal).
    VTXO_STATUS_FORFEITED = 5;

    // VTXO_STATUS_SPENT indicates the VTXO was spent via an out-of-round
    // transaction (terminal).
    VTXO_STATUS_SPENT = 6;

    // VTXO_STATUS_UNILATERAL_EXIT indicates the VTXO has reached critical
    // expiry and is being resolved on-chain (terminal for the VTXO actor).
    VTXO_STATUS_UNILATERAL_EXIT = 7;

    // VTXO_STATUS_FAILED indicates an unrecoverable error (terminal).
    VTXO_STATUS_FAILED = 8;
}

// VTXO describes a virtual transaction output and its authoritative indexer
// metadata.
//
// Ancestry semantics: round-direct VTXOs (chain_depth = 0) and OOR VTXOs
// whose inputs all share a single commitment tx have ancestry_paths of
// length 1. OOR VTXOs created by an Ark tx whose inputs span multiple
// distinct commitment txs (cross-round multi-input) have ancestry_paths of
// length > 1, one per distinct commitment.
message VTXO {
    OutPoint outpoint = 1;

    // value_sat is the output value in satoshis.
    uint64 value_sat = 2;

    // pk_script is the output script for this VTXO.
    bytes pk_script = 3;

    VTXOStatus status = 4;

    // round_id identifies the round that created this VTXO.
    string round_id = 5;

    // commitment_txid is the txid of the commitment transaction (if known).
    bytes commitment_txid = 6;

    // batch_output_index is the output index in the commitment transaction
    // that roots the VTXO tree.
    uint32 batch_output_index = 7;

    // created_height is the chain height where this VTXO became relevant.
    // int32 follows btcd's block-height convention; negative values are
    // invalid and must be rejected by the server.
    int32 created_height = 8;

    // batch_expiry_height is the absolute height at which the batch
    // expires. int32 follows btcd's block-height convention; negative
    // values are invalid and must be rejected by the server.
    int32 batch_expiry_height = 9;

    // relative_expiry is the CSV delay for the unilateral exit path.
    uint32 relative_expiry = 10;

    // (field 11 retired: scalar tree_depth replaced by per-AncestryPath
    // tree_depth in ancestry_paths)

    // leaf_tx is the serialized signed leaf virtual transaction when available.
    bytes leaf_tx = 12;

    // oor_ark_psbt is the serialized finalized Ark PSBT for virtual/OOR VTXOs.
    bytes oor_ark_psbt = 13;

    // oor_final_checkpoint_psbts are serialized finalized checkpoint PSBTs for
    // virtual/OOR VTXOs.
    repeated bytes oor_final_checkpoint_psbts = 14;

    // chain_depth is the number of OOR checkpoint hops between this VTXO
    // and the most recent on-chain commitment. Round-created VTXOs have
    // chain_depth 0.
    uint32 chain_depth = 15;

    // (field 16 retired: singular tree_path replaced by repeated
    // ancestry_paths to support cross-round multi-input OOR VTXOs.)

    // spent_by_txid is the Ark/OOR transaction txid that spent this VTXO when
    // the spend was finalized through an out-of-round checkpoint path.
    bytes spent_by_txid = 17;

    // ancestry_paths is the set of rooted VTXO tree fragments required to
    // unilaterally exit this VTXO. Round-direct or single-commitment OOR
    // VTXOs have exactly one entry; cross-commitment multi-input OOR VTXOs
    // have one entry per distinct contributing commitment tx.
    repeated AncestryPath ancestry_paths = 18;

    // operator_pubkey is the compressed operator public key committed to this
    // VTXO's collaborative spend path.
    bytes operator_pubkey = 19;

    // construction_version is the per-VTXO construction version: the rules
    // under which this VTXO was built and must be spent or exited. The
    // operator stamps it at creation. A client recovering a VTXO from this
    // indexer response validates it fail-closed and records the normalized
    // value so both sides agree; the live-receive push path (VTXOEvent /
    // IncomingVTXOEvent) does not yet carry this field and adopts it as a
    // fast-follow. Today the only understood value is 1.
    uint32 construction_version = 20;
}

message ListVTXOsByScriptsRequest {
    repeated ScriptScope scripts = 1;

    // status_filter optionally restricts results to VTXOs in the provided
    // statuses. If empty, server default policy applies.
    repeated VTXOStatus status_filter = 2;

    // cursor is an opaque pagination cursor returned by a prior response.
    // It is only valid with the same scripts and status_filter values.
    bytes cursor = 3;

    // limit bounds the number of results returned.
    uint32 limit = 4;
}

message ListVTXOsByScriptsResponse {
    // vtxos carries every indexer VTXO matching the queried scripts in the
    // indexer's natural cursor order. Each entry carries its own pkScript and
    // outpoint, so callers that need per-script or per-outpoint indexing can
    // build the index they want locally; the wire format stays neutral.
    repeated VTXO vtxos = 1;

    // next_cursor is empty when the result set is exhausted.
    bytes next_cursor = 2;
}

message GetOORSessionByTxidRequest {
    ScriptScope script = 1;
    bytes session_txid = 2;
}

message GetOORSessionByTxidResponse {
    bytes ark_psbt = 1;
    repeated bytes checkpoint_psbts = 2;
}

// TreeNode is a node in a virtual transaction tree.
//
// The indexer may return internal nodes that do not correspond to leaf VTXOs.
message TreeNode {
    // txid identifies the virtual transaction.
    bytes txid = 1;

    // input is the outpoint this node spends.
    OutPoint input = 2;

    // num_outputs is the number of outputs created by this node transaction.
    uint32 num_outputs = 3;

    // raw_tx is the serialized signed virtual transaction for this node.
    bytes raw_tx = 4;
}

// TreeEdge describes a parent->child relationship in a virtual tree.
message TreeEdge {
    // parent_txid is the txid of the parent node.
    bytes parent_txid = 1;

    // parent_output_index selects the parent output that is spent by child.
    uint32 parent_output_index = 2;

    // child_txid is the txid of the child node.
    bytes child_txid = 3;
}

message GetSubtreeByScriptsRequest {
    repeated ScriptScope scripts = 1;

    // include_internal_nodes controls whether the response includes internal
    // nodes (branch txs). If false, only leaf metadata is returned.
    bool include_internal_nodes = 2;
}

message GetSubtreeByScriptsResponse {
    // vtxos contains the leaf VTXOs in the subtree.
    repeated VTXO vtxos = 1;

    // nodes contains any internal tree nodes required to connect leaves.
    repeated TreeNode nodes = 2;

    // edges contains directed edges between returned nodes.
    repeated TreeEdge edges = 3;
}

// VTXOEventType describes a change applied by the indexer.
enum VTXOEventType {
    VTXO_EVENT_TYPE_UNSPECIFIED = 0;
    VTXO_EVENT_TYPE_CREATED = 1;
    VTXO_EVENT_TYPE_STATUS_CHANGED = 2;
    VTXO_EVENT_TYPE_TERMINATED = 3;
}

// VTXOEvent is a monotonic state transition applied by the indexer.
message VTXOEvent {
    uint64 event_id = 1;
    VTXOEventType type = 2;

    OutPoint outpoint = 3;

    VTXOStatus status = 4;

    // created_at_unix_ms is informational.
    int64 created_at_unix_ms = 5;
}

message ListVTXOEventsByScriptsRequest {
    repeated ScriptScope scripts = 1;

    // after_event_id filters out events with event_id <= after_event_id.
    uint64 after_event_id = 2;

    // limit bounds the number of events returned.
    uint32 limit = 3;
}

message ListVTXOEventsByScriptsResponse {
    repeated VTXOEvent events = 1;
    uint64 next_cursor = 2;
}

// VTXOOrigin distinguishes how a VTXO was created so the receiving
// client can apply the correct materialization logic.
enum VTXOOrigin {
    // VTXO_ORIGIN_UNSPECIFIED is the default zero value.
    VTXO_ORIGIN_UNSPECIFIED = 0;

    // VTXO_ORIGIN_IN_ROUND indicates the VTXO was created as part of
    // a confirmed round (directed in-round send).
    VTXO_ORIGIN_IN_ROUND = 1;

    // VTXO_ORIGIN_OOR indicates the VTXO was created via an
    // out-of-round transfer.
    VTXO_ORIGIN_OOR = 2;
}

// IncomingVTXOEvent is delivered as a mailbox EVENT envelope. For
// VTXO_CREATED events from confirmed rounds, the pk_script and
// value_sat fields carry enough data for the client to materialize
// the VTXO without a follow-up indexer query.
message IncomingVTXOEvent {
    uint64 event_id = 1;
    VTXOEventType type = 2;
    OutPoint outpoint = 3;
    VTXOStatus status = 4;

    // pk_script is the VTXO output script. Present for CREATED events
    // so the client can match against registered receive scripts.
    bytes pk_script = 5;

    // value_sat is the VTXO amount in satoshis.
    uint64 value_sat = 6;

    // round_id identifies the round that created this VTXO.
    string round_id = 7;

    // batch_expiry_height is the absolute block height at which the
    // batch sweep path becomes spendable. The server MUST compute
    // this as confirmation_height + sweep_delay before publishing
    // the event.
    int32 batch_expiry_height = 8;

    // relative_expiry is the CSV delay for the unilateral exit path.
    uint32 relative_expiry = 9;

    // origin indicates how the VTXO was created (in-round send vs
    // out-of-round transfer).
    VTXOOrigin origin = 10;

    // commitment_txid is the transaction ID of the round's
    // commitment transaction. This is distinct from the leaf txid
    // carried in the outpoint field.
    bytes commitment_txid = 11;
}
