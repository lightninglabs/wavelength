type: google.api.Service
config_version: 3

http:
  rules:
    - selector: arkrpc.ArkService.GetInfo
      post: /v1/ark/get-info
      body: "*"
    - selector: arkrpc.ArkService.EstimateFee
      post: /v1/ark/estimate-fee
      body: "*"
    - selector: arkrpc.ArkService.RegisterVirtualChannel
      post: /v1/ark/register-virtual-channel
      body: "*"
    - selector: arkrpc.ArkService.ActivateVirtualChannel
      post: /v1/ark/activate-virtual-channel
      body: "*"
    - selector: arkrpc.ArkService.CosignVirtualChannelBacking
      post: /v1/ark/cosign-virtual-channel-backing
      body: "*"
    - selector: arkrpc.ArkService.RequestVirtualChannelIntent
      post: /v1/ark/request-virtual-channel-intent
      body: "*"
