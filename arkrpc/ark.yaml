type: google.api.Service
config_version: 3

http:
  rules:
    - selector: arkrpc.ArkService.GetInfo
      post: /v1/ark/get-info
      body: "*"
    - selector: arkrpc.ArkService.EstimateFee
      post: /v1/ark/estimate-fee
      body: "*"
    - selector: arkrpc.ArkService.RegisterTaprootAssetVTXO
      post: /v1/ark/register-taproot-asset-vtxo
      body: "*"
