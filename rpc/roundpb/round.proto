syntax = "proto3";

package round.v1;

option go_package = "github.com/lightninglabs/wavelength/rpc/roundpb;roundpb";

// --------------------------------------------------------------------------
// Primitive sub-messages
// --------------------------------------------------------------------------

// Outpoint identifies a transaction output by its transaction hash and output
// index. This mirrors btcd's wire.OutPoint.
message Outpoint {
    // tx_hash is the 32-byte transaction hash in internal byte order.
    bytes tx_hash = 1;

    // output_index is the zero-based index of the output in the transaction.
    uint32 output_index = 2;
}

// TxOut represents a transaction output with a value and script.
message TxOut {
    // value is the output amount in satoshis.
    int64 value = 1;

    // pk_script is the output script (scriptPubKey).
    bytes pk_script = 2;
}

// --------------------------------------------------------------------------
// Tree sub-messages
// --------------------------------------------------------------------------

// TreeNode represents a single node in a VTXO or connector tree. Nodes are
// serialized in pre-order so children can reference parent indices.
message TreeNode {
    // input is the outpoint this transaction spends.
    Outpoint input = 1;

    // outputs are all the outputs created by this transaction.
    repeated TxOut outputs = 2;

    // co_signers are the compressed public keys (33 bytes each) that must
    // participate in MuSig2 signing for this node's input.
    repeated bytes co_signers = 3;

    // children maps output index to the index of the child TreeNode in the
    // parent VTXOTree's flattened nodes array.
    map<uint32, uint32> children = 4;

    // amount is the total BTC value (satoshis) for this node.
    int64 amount = 5;

    // signature is the final aggregated MuSig2 schnorr signature (64 bytes)
    // for the input. Empty if unsigned.
    bytes signature = 6;
}

// VTXOTree is a flattened representation of a VTXO or connector tree.
// The root node is always at index 0.
message VTXOTree {
    // nodes is the pre-order flattened list of tree nodes. Index 0 is the
    // root.
    repeated TreeNode nodes = 1;

    // batch_outpoint is the outpoint in the commitment transaction that the
    // root transaction spends.
    Outpoint batch_outpoint = 2;

    // batch_output is the actual output at batch_outpoint.
    TxOut batch_output = 3;

    // sweep_tapscript_root is the tapscript root hash for tweaking branch
    // outputs. Empty for connector trees.
    bytes sweep_tapscript_root = 4;
}

// --------------------------------------------------------------------------
// Connector leaf info
// --------------------------------------------------------------------------

// ConnectorLeafInfo contains information about a connector leaf assigned to a
// forfeit request. Used in server-to-client batch info messages.
//
// Fields 3-6 carry the connector-tree ancestry parameters the client needs to
// prove the assigned leaf descends from this round's commitment transaction.
// Connector trees have identical leaves and a deterministic BFS layout, so the
// client reconstructs the exact tree from these scalars plus the commitment tx
// output at root_output_index and the operator key — no tree transactions are
// shipped. The client then asserts leaf_outpoint/leaf_output is the leaf at
// leaf_index of that reconstructed tree before signing the forfeit.
message ConnectorLeafInfo {
    // leaf_outpoint is the outpoint of the connector leaf.
    Outpoint leaf_outpoint = 1;

    // leaf_output is the connector leaf's transaction output.
    TxOut leaf_output = 2;

    // root_output_index is the commitment-tx output index that this
    // connector tree's root transaction spends (the tree's batch outpoint
    // index). It binds the connector tree to the commitment tx.
    uint32 root_output_index = 3;

    // num_leaves is the total number of connector leaves in this tree.
    uint32 num_leaves = 4;

    // radix is the connector tree branching factor used to build the tree.
    uint32 radix = 5;

    // leaf_index is the position of this leaf within the connector tree.
    uint32 leaf_index = 6;
}

// ClientConnectorLeafInfo extends ConnectorLeafInfo with client-side fields
// needed to construct forfeit transactions. Currently unused in wire
// protocol messages; reserved for future client-to-server forfeit flows.
message ClientConnectorLeafInfo {
    // leaf_index is the position of this connector in the connector tree.
    int32 leaf_index = 1;

    // connector_outpoint is the outpoint of the connector output.
    Outpoint connector_outpoint = 2;

    // connector_pk_script is the scriptPubKey of the connector output.
    bytes connector_pk_script = 3;

    // connector_amount is the value of the connector output in satoshis.
    int64 connector_amount = 4;

    // vtxo_amount is the value of the VTXO being forfeited in satoshis.
    int64 vtxo_amount = 5;
}

// --------------------------------------------------------------------------
// Server-to-Client (S2C) event messages
// --------------------------------------------------------------------------

// ClientSuccessResp is sent by the server to a client when they successfully
// join a round.
message ClientSuccessResp {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // accepted_boarding_outpoints lists boarding outpoints accepted into the
    // round. Used by clients to correlate the response to the correct
    // pending round.
    repeated Outpoint accepted_boarding_outpoints = 2;

    // accepted_vtxo_outpoints lists VTXO outpoints involved in the round.
    repeated Outpoint accepted_vtxo_outpoints = 3;
}

// ClientBatchInfo contains the commitment transaction data sent to a client
// after the server builds the batch.
message ClientBatchInfo {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // batch_psbt is the serialized PSBT of the commitment transaction.
    bytes batch_psbt = 2;

    // vtxo_tree_paths maps commitment tx output indices to the client's
    // extracted VTXO sub-tree.
    map<int32, VTXOTree> vtxo_tree_paths = 3;

    // connector_leaf_map maps outpoints to connector leaf info. The key
    // is the standard "hash:index" string format produced by
    // wire.OutPoint.String() (byte-reversed hex hash, colon, decimal
    // index).
    map<string, ConnectorLeafInfo> connector_leaf_map = 4;

    // tree_cosign_key is this round's VTXO-tree MuSig2 cosigner public key
    // (33-byte compressed). It is derived fresh per round and is independent
    // of the operator's persistent identity key, so rotating the operator
    // key never changes the tree-signing key clients must agree on. The
    // client uses this — not the global operator terms — as the server
    // cosigner when validating and signing this round's VTXO output tree.
    bytes tree_cosign_key = 5;

    // connector_operator_key is the operator key (33-byte compressed) this
    // round used to build its connector tree. The client reconstructs the
    // connector tree from this key — not the global operator terms — so a
    // client still on a previous operator-key epoch derives the same
    // connector outpoints the server did.
    bytes connector_operator_key = 6;

    // sweep_key is the operator sweep key (33-byte compressed) for this
    // round's VTXO-tree sweep leaf. The client rebuilds the VTXO tree's
    // sweep branch from this key — not the global operator terms — so an
    // operator key rotation never changes the sweep key clients must agree
    // on for the round they joined.
    bytes sweep_key = 7;

    // sweep_delay is this round's batch-wide absolute-timelock in blocks for
    // the VTXO-tree sweep leaf. The client uses it — not the global operator
    // terms — to compute the batch expiry and reconstruct the sweep branch,
    // keeping a client on a previous operator-key epoch in agreement with the
    // server.
    uint32 sweep_delay = 8;

    // forfeit_key is the operator's dedicated forfeit penalty key (33-byte
    // compressed) for this round. The client derives the forfeit-tx penalty
    // output script as a BIP-86 key-spend to this key — not the global
    // operator terms — so an operator key rotation never changes the penalty
    // script clients must agree on for the round they joined. It is a key
    // family distinct from the operator identity/connector key.
    bytes forfeit_key = 9;

    // flow_version is the per-round flow version: the choreography rules
    // under which the operator created this round. The client records the
    // same value so both sides agree on how the round was conducted. Today
    // the only understood value is 1.
    uint32 flow_version = 10;
}

// ClientAwaitingInputSigsResp notifies a client that the server is ready
// to receive their boarding input signatures.
message ClientAwaitingInputSigsResp {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;
}

// ClientVTXOAggNonces contains the aggregated MuSig2 public nonces for
// transactions where the client is a cosigner.
message ClientVTXOAggNonces {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // agg_nonces maps transaction IDs (32 bytes) to aggregated public
    // nonces (66 bytes).
    map<string, bytes> agg_nonces = 2;
}

// ClientVTXOAggSigs contains the final aggregated schnorr signatures for
// transactions where the client is a cosigner.
message ClientVTXOAggSigs {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // agg_sigs maps transaction IDs (32 bytes) to aggregated schnorr
    // signatures (64 bytes).
    map<string, bytes> agg_sigs = 2;
}

// RoundFailureCode classifies why a round the client had already joined
// failed, so the client can react programmatically instead of parsing the
// human-readable reason string. New codes may be added over time; a client
// MUST treat an unrecognized code as ROUND_FAILURE_UNKNOWN and fall back to
// the reason string.
enum RoundFailureCode {
    // ROUND_FAILURE_UNKNOWN is the default, unclassified failure. Older
    // servers that predate this field also leave it here. The client
    // treats it as a generic recoverable failure and relies on the
    // reason string.
    ROUND_FAILURE_UNKNOWN = 0;

    // ROUND_FAILURE_INSUFFICIENT_OPERATOR_FUNDS indicates the operator
    // could not fund the round's commitment transaction from its own
    // on-chain wallet. The client's inputs were never committed, so any
    // forfeit-reserved inputs are released back to the live set. The
    // client should terminally fail the originating job rather than
    // auto-retry it into the same wall.
    ROUND_FAILURE_INSUFFICIENT_OPERATOR_FUNDS = 1;
}

// ClientRoundFailedResp notifies a client that the round they joined has
// failed.
message ClientRoundFailedResp {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // reason describes why the round failed.
    string reason = 2;

    // failure_code classifies the failure so the client can react
    // programmatically. Servers that predate this field, and failures
    // that are not specifically classified, leave it ROUND_FAILURE_UNKNOWN.
    RoundFailureCode failure_code = 3;
}

// ClientErrorResp sends an error message to a client.
message ClientErrorResp {
    // error_msg is the error message.
    string error_msg = 1;
}

// RoundLifecycleStatus classifies where a round sits in its lifecycle
// from the operator's authoritative view: the live FSM first, then the
// durable round store. Because a finalized round is persisted atomically
// with its VTXOs before its commitment tx is ever broadcast, a round the
// operator does not know (ROUND_STATUS_DEAD) can never have produced a
// broadcastable commitment.
enum RoundLifecycleStatus {
    // ROUND_STATUS_UNSPECIFIED is the zero value; treat as unknown.
    ROUND_STATUS_UNSPECIFIED = 0;

    // ROUND_STATUS_IN_FLIGHT: a live FSM exists and the round has not
    // reached a terminal state; the commitment tx has not been broadcast.
    ROUND_STATUS_IN_FLIGHT = 1;

    // ROUND_STATUS_BROADCAST: the round finalized and its commitment tx
    // has been broadcast, but has not yet confirmed.
    ROUND_STATUS_BROADCAST = 2;

    // ROUND_STATUS_CONFIRMED: the round's commitment tx confirmed
    // on chain.
    ROUND_STATUS_CONFIRMED = 3;

    // ROUND_STATUS_DEAD: the round failed, or the operator has no record
    // of it at all. Either way it never finalized, so its commitment tx
    // can never confirm and any forfeit signatures the client produced
    // for it are unspendable.
    ROUND_STATUS_DEAD = 4;
}

// ClientRoundStatusReport answers a QueryRoundStatusRequest with the
// operator's authoritative view of a round's lifecycle state. The
// client uses ROUND_STATUS_DEAD as the proof-of-death that makes a
// post-signing forfeit-reservation release safe.
message ClientRoundStatusReport {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // status is the round's lifecycle classification.
    RoundLifecycleStatus status = 2;

    // detail is a free-form diagnostic string (e.g. the failure reason
    // for a dead round).
    string detail = 3;
}

// --------------------------------------------------------------------------
// Client-to-Server (C2S) request messages
// --------------------------------------------------------------------------

// BoardingRequest represents a request to board the Ark via a UTXO.
message BoardingRequest {
    // outpoint is the UTXO that will be used as input.
    Outpoint outpoint = 1;

    // policy_template is the semantic arkscript policy for the boarding
    // output.
    bytes policy_template = 2;

    // tx_proof is the optional serialized SPV proof that the boarding UTXO
    // exists. Empty if the server verifies via its own chain source.
    bytes tx_proof = 3;
}

// VTXORequest specifies a VTXO the client wants to receive.
//
// Under the #270 seal-time fee handshake this is an INTENT only:
// the client expresses what VTXOs it wants and the target amounts
// for each, but the server decides the final amounts when the
// round seals (because it alone knows the real batch size +
// chain rate + treasury utilization at that moment). The server
// replies with a per-client JoinRoundQuote carrying the
// server-computed amounts; the client either signs (implicit
// accept) or sends JoinRoundReject.
message VTXORequest {
    // target_amount_sat is the client's target amount in satoshis
    // for this output. Honored verbatim unless this request is
    // marked as the change output (`is_change=true`), in which
    // case the server computes the residual
    // (`Σin − Σ(fixed targets) − fee`) and fills this field on
    // the responding JoinRoundQuote. Set to 0 on the intent for
    // change outputs.
    int64 target_amount_sat = 1;

    // policy_template is the semantic arkscript policy for the requested
    // output.
    bytes policy_template = 2;

    // signing_key is the compressed public key (33 bytes) used for MuSig2
    // cosigning and join-auth proof binding.
    bytes signing_key = 3;

    // is_change marks this VTXORequest as the client's designated
    // fee-bearing change output. Exactly one output across the
    // combined vtxo_requests + leave_requests lists may have this
    // set (servers reject intents with 0 or ≥2 markers, except
    // when the total output count is 1 and the change bit is
    // treated as implicit). A directed-send VTXORequest may be
    // marked as change; that opts the recipient into "subtract
    // fee from send amount" semantics.
    bool is_change = 4;

    // fixed_amount requires the server quote to preserve target_amount_sat
    // exactly. When this is set on a single-output intent, the single-output
    // implicit-change exception is disabled and the intent must include a
    // separate fee-bearing change output if fees need to be paid.
    bool fixed_amount = 5;
}

// ForfeitRequest specifies a VTXO the client wants to forfeit.
message ForfeitRequest {
    // vtxo_outpoint is the outpoint of the VTXO to forfeit.
    Outpoint vtxo_outpoint = 1;

    // auth_spend_path is the serialized custom spend path used to prove
    // control of non-wallet-managed VTXOs when joining a round. Standard
    // wallet VTXOs omit this field and let the operator load their canonical
    // spend path from the VTXO registry.
    bytes auth_spend_path = 2;

    // forfeit_spend_path is the serialized custom spend path the operator
    // should use when constructing the exact forfeit transaction after
    // connector assignment. This is required for swap vHTLC refreshes because
    // the operator cannot infer their custom three-party branch from a
    // standard wallet descriptor.
    bytes forfeit_spend_path = 3;
}

// VTXOClaimInput authorizes reissuing a VTXO that expired while its owner was
// offline and whose value was reclaimed by the operator's expiry sweep. The
// server derives the replacement amount and policy from the source VTXO; the
// client selects only the fresh tree-signing key.
message VTXOClaimInput {
    // source_outpoint identifies the expired VTXO being reissued.
    Outpoint source_outpoint = 1;

    // participant_pubkey is the compressed owner key authorized by the
    // source VTXO policy.
    bytes participant_pubkey = 2;

    // replacement_signing_pubkey is the fresh compressed MuSig2 tree-signing
    // key for the replacement VTXO.
    bytes replacement_signing_pubkey = 3;

    // nonce is a unique 32-byte replay-prevention value.
    bytes nonce = 4;

    // valid_from is the first block height where this claim is valid.
    uint32 valid_from = 5;

    // valid_until is the last block height where this claim is valid.
    uint32 valid_until = 6;

    // signature is a 64-byte BIP-340 Schnorr signature over the canonical
    // claim message.
    bytes signature = 7;
}

// LeaveRequest specifies an on-chain output for leaving the Ark.
//
// The pk_script identifies the destination; the amount follows
// the same intent semantics as VTXORequest.target_amount_sat
// (honored verbatim when is_change=false; server-computed residual
// when is_change=true).
message LeaveRequest {
    // pk_script is the destination on-chain output script.
    bytes pk_script = 1;

    // target_amount_sat is the client's target amount in satoshis
    // for this on-chain output. Server fills in the residual when
    // is_change=true.
    int64 target_amount_sat = 2;

    // is_change marks this LeaveRequest as the client's
    // designated fee-bearing change output. Same "exactly one"
    // invariant as VTXORequest.is_change.
    bool is_change = 3;
}

// JoinRoundAuth contains the BIP-322 authorization payload.
message JoinRoundAuth {
    // message is the canonical join message signed by the client.
    bytes message = 1;

    // valid_from is the first block height where this auth is accepted.
    uint32 valid_from = 2;

    // valid_until is the last block height where this auth is accepted.
    // Zero means no upper bound.
    uint32 valid_until = 3;

    // signature is the serialized BIP-322 signature payload.
    bytes signature = 4;
}

// JoinRoundRequest is sent from client to server as the Phase-1
// intent of the two-phase seal-time fee handshake (#270). It
// expresses the client's structural intent (inputs, recipients,
// target amounts, designated change output) without committing to
// the absolute fee: the server replies with a per-client
// JoinRoundQuote once the round seals, carrying the
// server-computed amounts that reflect the real batch size, real
// chain rate, and real treasury utilization at seal time.
message JoinRoundRequest {
    // identifier is the compressed public key (33 bytes) of the
    // participant.
    bytes identifier = 1;

    // boarding_requests contains all boarding UTXO details.
    repeated BoardingRequest boarding_requests = 2;

    // vtxo_requests specifies the VTXOs the client wants to receive.
    repeated VTXORequest vtxo_requests = 3;

    // forfeit_requests specifies VTXOs to forfeit.
    repeated ForfeitRequest forfeit_requests = 4;

    // leave_requests specifies VTXOs being exited to on-chain outputs.
    repeated LeaveRequest leave_requests = 5;

    // round_id is optional; empty means the server assigns a round.
    string round_id = 6;

    // auth contains the BIP-322 authorization payload. Nil when join
    // request auth is disabled.
    JoinRoundAuth auth = 7;

    // claim_inputs contains independently-authorized expired VTXOs whose
    // swept value should be reissued in this round.
    repeated VTXOClaimInput claim_inputs = 8;
}

// QuoteReason classifies why a JoinRoundQuote failed to admit the
// client's intent. When reject_reason != QUOTE_OK the quote's
// vtxo_quotes / leave_quotes lists are empty and the client is
// expected to either re-intent next round or raise the relevant
// bounds.
enum QuoteReason {
    // QUOTE_OK is the success case; the quote carries valid
    // per-output amounts and operator_fee_sat.
    QUOTE_OK = 0;

    // INSUFFICIENT_RESIDUAL indicates that after applying the
    // client's fixed target amounts and the server-computed fee,
    // the change output residual would be negative or below dust.
    INSUFFICIENT_RESIDUAL = 1;

    // INVALID_CHANGE_DESIGNATION indicates the intent did not
    // specify exactly one is_change output (and did not have a
    // single output for implicit change).
    INVALID_CHANGE_DESIGNATION = 2;
}

// FeeBreakdown decomposes the operator fee a JoinRoundQuote
// charges so the client can verify the fee against its
// user-facing cap and log the decomposition for observability.
message FeeBreakdown {
    // chain_fee_sat is the on-chain share of the fee (per-input
    // component of the commitment tx broadcast cost).
    int64 chain_fee_sat = 1;

    // liquidity_fee_sat is the time-value-of-money component
    // (non-zero for forfeit inputs only; zero for fresh boardings).
    int64 liquidity_fee_sat = 2;

    // congestion_fee_sat is the treasury-utilization-driven spread
    // applied on top of the base fee.
    int64 congestion_fee_sat = 3;

    // fee_rate_sat_kw is the on-chain fee rate (sat/kW) the server
    // saw at seal time.
    int64 fee_rate_sat_kw = 4;

    // batch_size is the number of accepted intents the server
    // sized the on-chain share against.
    uint32 batch_size = 5;
}

// VTXOQuote is the server-computed amount for a single
// VTXORequest from the intent. pkscript and recipient_key tie the
// quote back to the corresponding intent entry so the client can
// verify the tree leaves match the intent's recipient.
message VTXOQuote {
    // pk_script is the expected VTXO output script, derived from
    // the intent's policy template + recipient key.
    bytes pk_script = 1;

    // amount_sat is the server-decided amount in satoshis. For
    // non-change outputs this equals the intent's
    // target_amount_sat; for the change output it is
    // `Σin − Σ(fixed targets) − operator_fee_sat`.
    int64 amount_sat = 2;

    // recipient_key is the MuSig2 signing key from the intent,
    // echoed back as a correlation handle.
    bytes recipient_key = 3;
}

// LeaveQuote is the server-computed amount for a single
// LeaveRequest on-chain output.
message LeaveQuote {
    // pk_script is the destination on-chain script, echoed from
    // the intent.
    bytes pk_script = 1;

    // amount_sat is the server-decided amount in satoshis. Same
    // semantics as VTXOQuote.amount_sat.
    int64 amount_sat = 2;
}

// VTXOClaimQuote describes the exact replacement output derived by the server
// for one claim input. Claim outputs are fixed-value and pay no operator fee.
message VTXOClaimQuote {
    // source_outpoint correlates this quote with the claim input.
    Outpoint source_outpoint = 1;

    // pk_script is the exact replacement VTXO output script.
    bytes pk_script = 2;

    // amount_sat is the full source VTXO value.
    int64 amount_sat = 3;

    // replacement_signing_pubkey echoes the fresh MuSig2 tree-signing key
    // selected by the claimant.
    bytes replacement_signing_pubkey = 4;

    // policy_template is the exact serialized historical policy copied from
    // the swept source VTXO.
    bytes policy_template = 5;
}

// JoinRoundQuote is sent from server to client as the Phase-2
// response of the seal-time fee handshake. Delivered via the
// durable per-client mailbox egress (symmetric to
// BroadcastRoundReq / commitment-tx broadcast), so a crash between
// seal and dispatch still redelivers a stable-msg-id quote on
// reconnect.
message JoinRoundQuote {
    // round_id is the UUID of the round, encoded as a 16-byte
    // string.
    string round_id = 1;

    // quote_id binds this quote to a specific seal pass and
    // client. Downstream messages (nonces, forfeit sigs, reject)
    // echo it so the server can drop stale submissions from a
    // prior pass after a reseal.
    bytes quote_id = 2;

    // seal_pass_number counts reseal iterations from zero. The
    // server caps reseals at a configured maximum and finalizes
    // with last-pass accepts when the cap is hit.
    uint32 seal_pass_number = 3;

    // vtxo_quotes carries one VTXOQuote per VTXORequest in the
    // intent, in the same order. Empty when reject_reason !=
    // QUOTE_OK.
    repeated VTXOQuote vtxo_quotes = 4;

    // leave_quotes carries one LeaveQuote per LeaveRequest in the
    // intent, in the same order. Empty when reject_reason !=
    // QUOTE_OK.
    repeated LeaveQuote leave_quotes = 5;

    // operator_fee_sat is the total operator fee across all of
    // this client's inputs.
    int64 operator_fee_sat = 6;

    // breakdown itemizes operator_fee_sat for client-side logging
    // and cap validation.
    FeeBreakdown breakdown = 7;

    // quote_expires_at is the unix timestamp (seconds) after which
    // the server treats the quote as timed out and reseals.
    int64 quote_expires_at = 8;

    // reject_reason is populated when the server drops this
    // client's intent at seal time (e.g. residual would be
    // negative). QUOTE_OK indicates a valid quote.
    QuoteReason reject_reason = 9;

    // claim_quotes carries one fixed, zero-fee VTXOClaimQuote per claim input
    // in the same order. Empty when reject_reason != QUOTE_OK.
    repeated VTXOClaimQuote claim_quotes = 10;
}

// JoinRoundAccept is sent from client to server to explicitly
// accept a JoinRoundQuote. The server must receive an explicit
// accept (or the quote must expire, or the client must reject)
// before it begins constructing the VTXO tree — nonces cannot
// stand in for acceptance because the tree does not exist until
// after the accepted set is known.
message JoinRoundAccept {
    // round_id is the UUID of the round the quote belonged to.
    string round_id = 1;

    // quote_id echoes the id from the JoinRoundQuote being
    // accepted so the server can drop stale accepts that
    // reference a prior seal pass.
    bytes quote_id = 2;
}

// JoinRoundReject is sent from client to server to explicitly
// reject a JoinRoundQuote before its expires_at. The server
// reseals over the remaining accepted intents.
message JoinRoundReject {
    // round_id is the UUID of the round the quote belonged to.
    string round_id = 1;

    // quote_id echoes the id from the JoinRoundQuote being
    // rejected so the server can ignore stale rejects that
    // reference a prior seal pass.
    bytes quote_id = 2;

    // reason is a free-form string for operator-side diagnostics.
    // The server's reseal decision is invariant to this value.
    string reason = 3;
}

// SubmitNoncesRequest submits MuSig2 nonces from client to server.
message SubmitNoncesRequest {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // nonces maps signing keys (33 bytes hex) to their per-transaction
    // nonces. Each entry maps a transaction ID (32 bytes hex) to a MuSig2
    // public nonce (66 bytes).
    map<string, SignerNonces> nonces = 2;
}

// SignerNonces groups per-transaction nonces for a single signing key.
message SignerNonces {
    // tx_nonces maps transaction IDs (hex-encoded 32 bytes) to MuSig2
    // public nonces (66 bytes).
    map<string, bytes> tx_nonces = 1;
}

// SubmitPartialSigRequest submits MuSig2 partial signatures from client to
// server.
message SubmitPartialSigRequest {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // signatures maps signing keys (33 bytes hex) to their per-transaction
    // partial signatures.
    map<string, SignerPartialSigs> signatures = 2;
}

// SignerPartialSigs groups per-transaction partial signatures for a single
// signing key.
message SignerPartialSigs {
    // tx_sigs maps transaction IDs (hex-encoded 32 bytes) to partial
    // MuSig2 signatures (32 bytes).
    map<string, bytes> tx_sigs = 1;
}

// BoardingInputSignature contains a client's signature for a boarding input.
message BoardingInputSignature {
    // input_index is the index of the input in the transaction.
    int32 input_index = 1;

    // outpoint identifies which boarding input this signature is for.
    Outpoint outpoint = 2;

    // client_signature is the schnorr signature (64 bytes).
    bytes client_signature = 3;
}

// SubmitForfeitSigRequest submits boarding input signatures from client to
// server.
message SubmitForfeitSigRequest {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // signatures contains the boarding input signatures.
    repeated BoardingInputSignature signatures = 2;
}

// ForfeitTxSig pairs an unsigned forfeit transaction with the client's VTXO
// signature.
message ForfeitParticipantSig {
    // pubkey is the x-only public key that produced the tapscript signature.
    bytes pubkey = 1;

    // signature is the schnorr signature for the forfeited VTXO input.
    bytes signature = 2;
}

message ForfeitTxSig {
    // vtxo_outpoint is the VTXO outpoint being forfeited.
    Outpoint vtxo_outpoint = 1;

    // unsigned_tx is the serialized unsigned forfeit transaction.
    bytes unsigned_tx = 2;

    // client_vtxo_sig is the client's schnorr signature (64 bytes) for
    // the collaborative 2-of-2 spend from the VTXO.
    bytes client_vtxo_sig = 3;

    // spend_path is the canonical arkscript spend-path encoding for the
    // forfeited VTXO input.
    bytes spend_path = 4;

    // participant_sigs carries additional non-operator signatures for
    // policy leaves that require more than one client-side participant.
    //
    // Legacy standard VTXO forfeits continue to use client_vtxo_sig above.
    // When participant_sigs is non-empty, receivers should treat
    // client_vtxo_sig as an optional backwards-compatible duplicate and use
    // participant_sigs as the authoritative signature set.
    repeated ForfeitParticipantSig participant_sigs = 5;
}

// SubmitVTXOForfeitSigsRequest submits VTXO forfeit signatures from client
// to server.
message SubmitVTXOForfeitSigsRequest {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;

    // forfeit_txs contains the forfeit transaction signatures.
    repeated ForfeitTxSig forfeit_txs = 2;
}

// QueryRoundStatusRequest asks the operator for the authoritative
// lifecycle status of a round. A client that has sent forfeit
// signatures uses it to reconcile a round's fate before releasing the
// forfeit reservations: only a ROUND_STATUS_DEAD answer (the round
// never finalized, so its commitment tx can never confirm) makes the
// release double-spend-safe.
message QueryRoundStatusRequest {
    // round_id is the UUID of the round (16 bytes).
    bytes round_id = 1;
}

// --------------------------------------------------------------------------
// Service definition for mailbox routing
// --------------------------------------------------------------------------

// RoundService defines the RPCs and events used for the round protocol between
// server and client over the mailbox transport.
service RoundService {
    // JoinRound registers a client for a round by sending a
    // JoinRoundRequest (intent). The ack carries no amount
    // commitment; the binding per-client amounts arrive later via
    // the durable mailbox as a JoinRoundQuote.
    rpc JoinRound (JoinRoundRequest) returns (ClientSuccessResp);

    // AcceptQuote explicitly accepts a JoinRoundQuote. The
    // server advances from QuoteSentState to BatchBuildingState
    // once every outstanding quote is accepted, rejected, or
    // timed out; client acceptance must be explicit because
    // nonces cannot be produced before the VTXO tree is built
    // from the accepted set.
    rpc AcceptQuote (JoinRoundAccept) returns (ClientSuccessResp);

    // RejectQuote explicitly rejects a JoinRoundQuote before its
    // expiry, triggering an immediate reseal over the remaining
    // accepted intents.
    rpc RejectQuote (JoinRoundReject) returns (ClientSuccessResp);

    // SubmitNonces submits MuSig2 nonces.
    rpc SubmitNonces (SubmitNoncesRequest) returns (ClientVTXOAggNonces);

    // SubmitPartialSigs submits MuSig2 partial signatures.
    rpc SubmitPartialSigs (SubmitPartialSigRequest) returns (ClientVTXOAggSigs);

    // SubmitForfeitSigs submits boarding input signatures.
    rpc SubmitForfeitSigs (SubmitForfeitSigRequest)
        returns (ClientAwaitingInputSigsResp);

    // SubmitVTXOForfeitSigs submits VTXO forfeit signatures.
    rpc SubmitVTXOForfeitSigs (SubmitVTXOForfeitSigsRequest)
        returns (ClientSuccessResp);

    // QueryRoundStatus asks for the authoritative lifecycle status of
    // a round. The answer arrives asynchronously as a
    // ClientRoundStatusReport push event; the RPC ack itself carries
    // no round state.
    rpc QueryRoundStatus (QueryRoundStatusRequest) returns (ClientSuccessResp);
}
