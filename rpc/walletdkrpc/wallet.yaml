type: google.api.Service
config_version: 3

http:
  rules:
    - selector: walletdkrpc.WalletService.Create
      post: /v1/wallet/create
      body: "*"
    - selector: walletdkrpc.WalletService.Unlock
      post: /v1/wallet/unlock
      body: "*"
    - selector: walletdkrpc.WalletService.PrepareSend
      post: /v1/wallet/prepare-send
      body: "*"
    - selector: walletdkrpc.WalletService.Send
      post: /v1/wallet/send
      body: "*"
    - selector: walletdkrpc.WalletService.Recv
      post: /v1/wallet/recv
      body: "*"
    - selector: walletdkrpc.WalletService.List
      post: /v1/wallet/list
      body: "*"
    - selector: walletdkrpc.WalletService.Deposit
      post: /v1/wallet/deposit
      body: "*"
    - selector: walletdkrpc.WalletService.Balance
      post: /v1/wallet/balance
      body: "*"
    - selector: walletdkrpc.WalletService.Status
      post: /v1/wallet/status
      body: "*"
    - selector: walletdkrpc.WalletService.GetExitPlan
      post: /v1/wallet/exit-plan
      body: "*"
    - selector: walletdkrpc.WalletService.SweepWallet
      post: /v1/wallet/sweep-wallet
      body: "*"
    - selector: walletdkrpc.WalletService.Exit
      post: /v1/wallet/exit
      body: "*"
    - selector: walletdkrpc.WalletService.ExitStatus
      post: /v1/wallet/exit-status
      body: "*"
    - selector: walletdkrpc.WalletService.ExitSummary
      post: /v1/wallet/exit-summary
      body: "*"
    - selector: walletdkrpc.WalletService.SubscribeWallet
      post: /v1/wallet/subscribe
      body: "*"
    - selector: walletdkrpc.WalletInspectionService.InspectActivity
      post: /v1/wallet/inspect/activity
      body: "*"
