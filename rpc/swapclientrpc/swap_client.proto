syntax = "proto3";

package swapclientrpc;

option go_package = "github.com/lightninglabs/wavelength/rpc/swapclientrpc";

// SwapClientService exposes daemon-owned Lightning/Ark swap execution to local
// clients. The service is registered only in swapruntime builds.
service SwapClientService {
    // QuotePay previews an Ark-to-Lightning payment without creating durable
    // swap state or starting a background worker.
    rpc QuotePay (QuotePayRequest) returns (QuotePayResponse);

    // StartPay starts an Ark-to-Lightning payment and lets the daemon continue
    // the swap in the background.
    rpc StartPay (StartPayRequest) returns (StartPayResponse);

    // StartReceive starts a Lightning-to-Ark receive swap and lets the daemon
    // continue the claim flow after the invoice is paid.
    rpc StartReceive (StartReceiveRequest) returns (StartReceiveResponse);

    // CreateCredit starts a durable credit funding session.
    rpc CreateCredit (CreateCreditRequest) returns (CreateCreditResponse);

    // RedeemCredit materializes available credits back into an Ark output.
    rpc RedeemCredit (RedeemCreditRequest) returns (RedeemCreditResponse);

    // ListCredits returns the server-authoritative credit account snapshot.
    rpc ListCredits (ListCreditsRequest) returns (ListCreditsResponse);

    // ResumeSwap asks the daemon to resume one persisted pending swap.
    rpc ResumeSwap (ResumeSwapRequest) returns (ResumeSwapResponse);

    // ListSwaps lists persisted swap sessions from the daemon-owned store.
    rpc ListSwaps (ListSwapsRequest) returns (ListSwapsResponse);

    // GetSwap returns one persisted swap session by payment hash.
    rpc GetSwap (GetSwapRequest) returns (GetSwapResponse);

    // SubscribeSwaps streams swap updates observed by the daemon. When
    // include_existing is set, the snapshot is sent before the live
    // subscription is registered, so callers that require a complete current
    // view should reconcile with ListSwaps or GetSwap after reconnect.
    rpc SubscribeSwaps (SubscribeSwapsRequest)
        returns (stream SubscribeSwapsResponse);
}

enum SwapDirection {
    SWAP_DIRECTION_UNSPECIFIED = 0;
    SWAP_DIRECTION_PAY = 1;
    SWAP_DIRECTION_RECEIVE = 2;
}

enum SwapSettlementType {
    SWAP_SETTLEMENT_TYPE_UNSPECIFIED = 0;
    SWAP_SETTLEMENT_TYPE_LIGHTNING = 1;
    SWAP_SETTLEMENT_TYPE_IN_ARK = 2;
    SWAP_SETTLEMENT_TYPE_CREDIT = 3;
    SWAP_SETTLEMENT_TYPE_MIXED = 4;
}

enum CreditFundingSource {
    CREDIT_FUNDING_SOURCE_UNSPECIFIED = 0;
    CREDIT_FUNDING_SOURCE_LIGHTNING_RECEIVE = 1;
    CREDIT_FUNDING_SOURCE_ARK_TOPUP = 2;
}

enum CreditOperationType {
    CREDIT_OPERATION_TYPE_UNSPECIFIED = 0;
    CREDIT_OPERATION_TYPE_FUNDING = 1;
    CREDIT_OPERATION_TYPE_PAY = 2;
    CREDIT_OPERATION_TYPE_REDEMPTION = 3;
    CREDIT_OPERATION_TYPE_RECEIVE = 4;
}

enum CreditOperationState {
    CREDIT_OPERATION_STATE_UNSPECIFIED = 0;
    CREDIT_OPERATION_STATE_CREATED = 1;
    CREDIT_OPERATION_STATE_AWAITING_PAYMENT = 2;
    CREDIT_OPERATION_STATE_CREDITED = 3;
    CREDIT_OPERATION_STATE_RESERVED = 4;
    CREDIT_OPERATION_STATE_PAYING_LIGHTNING = 5;
    CREDIT_OPERATION_STATE_DEBITED = 6;
    CREDIT_OPERATION_STATE_SENDING_OOR = 7;
    CREDIT_OPERATION_STATE_REDEEMED = 8;
    CREDIT_OPERATION_STATE_RELEASED = 9;
    CREDIT_OPERATION_STATE_EXPIRED = 10;
    CREDIT_OPERATION_STATE_FAILED = 11;
}

enum SwapState {
    SWAP_STATE_UNSPECIFIED = 0;
    SWAP_STATE_CREATED = 1;
    SWAP_STATE_SWAP_CREATED = 2;
    SWAP_STATE_FUNDING_INITIATED = 3;
    SWAP_STATE_VHTLC_FUNDED = 4;
    SWAP_STATE_WAITING_FOR_CLAIM = 5;
    SWAP_STATE_COMPLETED = 6;
    SWAP_STATE_EXPIRED = 7;
    SWAP_STATE_REFUND_INITIATED = 8;
    SWAP_STATE_REFUNDED = 9;
    SWAP_STATE_NEEDS_INTERVENTION = 10;
    SWAP_STATE_FAILED = 11;
    SWAP_STATE_INVOICE_CREATED = 12;
    SWAP_STATE_CLAIM_INITIATED = 13;
}

message QuotePayRequest {
    // invoice is the BOLT-11 Lightning invoice to preview.
    string invoice = 1;

    // max_fee_sat is the maximum Lightning routing fee the caller accepts.
    // Zero means no explicit caller cap. Quotes still return when the
    // estimated fee exceeds this cap so callers can render the fee.
    uint64 max_fee_sat = 2;

    // max_credit_sat is the maximum credit amount the caller is willing to
    // use for this quote. Zero means only required-credit shortfalls are
    // reported.
    uint64 max_credit_sat = 3;
}

message QuotePayResponse {
    // payment_hash is the hex Lightning payment hash that identifies the
    // invoice and eventual swap.
    string payment_hash = 1;

    // invoice_amount_sat is the sat-denominated invoice amount.
    uint64 invoice_amount_sat = 2;

    // amount_sat is the total amount that would leave the wallet.
    uint64 amount_sat = 3;

    // fee_sat is the swap-server fee in satoshis.
    uint64 fee_sat = 4;

    SwapSettlementType settlement_type = 5;

    // expires_at_unix is the unix timestamp after which the quote is stale.
    int64 expires_at_unix = 6;

    // exceeds_max_fee is true when max_fee_sat is non-zero and fee_sat is
    // larger than that cap.
    bool exceeds_max_fee = 7;

    CreditQuote credit_quote = 8;
}

message StartPayRequest {
    // invoice is the BOLT-11 Lightning invoice to pay.
    string invoice = 1;

    // max_fee_sat is the maximum Lightning routing fee the caller accepts.
    // Zero means no explicit caller cap.
    uint64 max_fee_sat = 2;

    // idempotency_key is reserved for a future daemon-level duplicate-start
    // guard. The current implementation relies on the persisted swap state
    // returned by the SDK once the payment hash is known.
    string idempotency_key = 3;

    // max_credit_sat is the maximum credit amount the caller authorizes this
    // pay to reserve.
    uint64 max_credit_sat = 4;
}

message StartPayResponse {
    // payment_hash is the Lightning payment hash that identifies the swap in
    // the daemon-owned store and worker registry.
    string payment_hash = 1;

    // swap is the initial durable summary after the pay session is persisted
    // and daemon background execution has been scheduled.
    SwapSummary swap = 2;
}

message CreateCreditRequest {
    string idempotency_key = 1;
    CreditFundingSource source = 2;
    uint64 amount_sat = 4;
    string memo = 5;
}

message CreateCreditResponse {
    string operation_id = 1;
    CreditOperationState state = 2;
    string invoice = 3;
    string payment_hash = 4;
    uint64 amount_sat = 6;
    bytes destination_pubkey = 7;
    int64 expires_at_unix = 8;
    SwapSummary swap = 9;
}

message RedeemCreditRequest {
    string idempotency_key = 1;
    uint64 amount_sat = 2;
    bytes destination_pubkey = 3;
}

message RedeemCreditResponse {
    string operation_id = 1;
    CreditOperationState state = 2;
    uint64 debited_sat = 3;
    uint64 redeemed_sat = 4;
    string session_id = 6;
}

message ListCreditsRequest {
    uint32 limit = 1;
}

message ListCreditsResponse {
    uint64 finalized_sat = 1;
    uint64 reserved_sat = 2;
    uint64 available_sat = 3;
    repeated CreditOperation operations = 4;
    repeated CreditLedgerEntry ledger_entries = 5;
}

message CreditQuote {
    bool must_use_credit = 1;
    uint64 credit_applied_sat = 2;
    uint64 credit_shortfall_sat = 3;
    uint64 credit_topup_sat = 4;
    uint64 ark_funding_sat = 5;
}

message CreditOperation {
    string operation_id = 1;
    CreditOperationType type = 2;
    CreditOperationState state = 3;
    uint64 amount_sat = 5;
    string payment_hash = 6;
    string invoice = 7;
    bytes destination_pubkey = 8;
    string session_id = 9;
    int64 created_at_unix = 10;
    int64 updated_at_unix = 11;
    int64 completed_at_unix = 12;
    string last_error = 13;
}

message CreditLedgerEntry {
    string entry_id = 1;
    string operation_id = 2;
    string direction = 3;
    uint64 amount_sat = 4;
    int64 created_at_unix = 5;
}

message StartReceiveRequest {
    // amount_sat is the Lightning amount to receive into Ark.
    int64 amount_sat = 1;

    // idempotency_key is reserved for a future daemon-level duplicate-start
    // guard.
    string idempotency_key = 2;

    // memo is an optional human-readable label to embed as the BOLT-11
    // invoice description.
    string memo = 3;
}

message StartReceiveResponse {
    // payment_hash is the Lightning payment hash committed into the invoice and
    // used as the daemon worker key.
    string payment_hash = 1;

    // invoice is the BOLT-11 payment request the payer should pay.
    string invoice = 2;

    // swap is the initial durable summary after the receive session is
    // persisted and daemon background execution has been scheduled.
    SwapSummary swap = 3;

    // requested_amount_sat is the invoice amount requested by the receiver.
    uint64 requested_amount_sat = 4;

    // available_credit_sat is the server-authoritative credit balance
    // considered for the receive plan.
    uint64 available_credit_sat = 5;

    // attached_credit_sat is the credit amount reserved and added to the funded
    // vHTLC for credit-assisted receives.
    uint64 attached_credit_sat = 6;

    // vhtlc_amount_sat is the funded vHTLC amount the client expects.
    uint64 vhtlc_amount_sat = 7;

    // dust_limit_sat is the minimum vHTLC output amount used by the server.
    uint64 dust_limit_sat = 8;

    // settlement_type identifies the selected receive rail.
    SwapSettlementType settlement_type = 9;
}

message ResumeSwapRequest {
    // payment_hash identifies the persisted swap to wake up.
    string payment_hash = 1;

    // direction tells the daemon which persisted FSM family to resume.
    SwapDirection direction = 2;
}

message ResumeSwapResponse {
    // swap is the current durable summary after the resume request is accepted.
    SwapSummary swap = 1;
}

message ListSwapsRequest {
    bool pending_only = 1;
}

message ListSwapsResponse {
    // swaps are the persisted pay and receive summaries known to the daemon.
    repeated SwapSummary swaps = 1;
}

message GetSwapRequest {
    // payment_hash identifies the persisted swap to fetch.
    string payment_hash = 1;
}

message GetSwapResponse {
    // swap is the current durable summary for the requested payment hash.
    SwapSummary swap = 1;
}

message SubscribeSwapsRequest {
    bool include_existing = 1;
    bool pending_only = 2;
}

message SubscribeSwapsResponse {
    // swap is the latest durable summary observed by the daemon.
    SwapSummary swap = 1;
}

message SwapSummary {
    // direction identifies whether the row belongs to an Ark-to-Lightning pay
    // swap or a Lightning-to-Ark receive swap.
    SwapDirection direction = 1;

    // payment_hash is the Lightning payment hash and daemon worker key.
    string payment_hash = 2;

    // state is the machine-readable SDK FSM state stored for this session.
    SwapState state = 3;

    // pending is true when the SDK considers the session resumable.
    bool pending = 4;

    // amount_sat is the requested or negotiated swap amount in satoshis.
    int64 amount_sat = 5;

    // fee_sat is the swap-server fee in satoshis when known.
    uint64 fee_sat = 6;

    // max_fee_sat is the caller-provided Lightning routing fee cap for pay
    // swaps.
    uint64 max_fee_sat = 7;

    // vhtlc_outpoint is the observed Ark vHTLC outpoint when known.
    string vhtlc_outpoint = 8;

    // vhtlc_amount_sat is the observed Ark vHTLC amount when known.
    int64 vhtlc_amount_sat = 9;

    // funding_session_id is the OOR session that funded a pay swap vHTLC.
    string funding_session_id = 10;

    // claim_session_id is the OOR session that claimed a receive swap vHTLC.
    string claim_session_id = 11;

    // refund_session_id is the OOR session that refunded a pay swap vHTLC, or
    // the observed spender txid adopted during resume.
    string refund_session_id = 12;

    // terminal_reason is the durable failure or intervention reason when the
    // session stopped outside the happy path.
    string terminal_reason = 13;

    // created_at_unix is the local creation timestamp for the persisted
    // session.
    int64 created_at_unix = 14;

    // updated_at_unix is the last local persistence timestamp for the session.
    int64 updated_at_unix = 15;

    // deadline_unix is the wall-clock expiry or deadline for the swap.
    int64 deadline_unix = 16;

    // refund_locktime is the Ark block height where the pay-swap refund path
    // matures.
    uint32 refund_locktime = 17;

    // invoice is the BOLT-11 payment request associated with this swap.
    // Receive swaps expose the invoice generated by the daemon; pay swaps
    // expose the invoice submitted by the caller.
    string invoice = 18;

    // settlement_type identifies the rail selected for the swap when known.
    SwapSettlementType settlement_type = 19;

    // sender_pubkey is the compressed SEC-encoded vHTLC sender key when known.
    string sender_pubkey = 20;

    // preimage is the hex-encoded Lightning payment preimage once the swap
    // revealed it. For a completed pay swap this is the proof of payment for
    // the paid invoice; it is empty until the preimage is durably known.
    string preimage = 21;

    // credit_quote is the credit plan applied to this swap when credits were
    // used to fund or assist it.
    CreditQuote credit_quote = 22;

    // requested_amount_sat is the invoice amount for receive swaps when it can
    // differ from the funded vHTLC amount.
    uint64 requested_amount_sat = 23;

    // attached_credit_sat is the credit amount attached to a credit-assisted
    // receive.
    uint64 attached_credit_sat = 24;

    // dust_limit_sat is the server dust limit used for receive planning.
    uint64 dust_limit_sat = 25;

    // available_credit_sat is the balance considered when the receive route was
    // planned.
    uint64 available_credit_sat = 26;
}
