syntax = "proto3";

package oorpb;

option go_package = "github.com/lightninglabs/wavelength/rpc/oorpb";

// OORMailboxService defines unary OOR mailbox methods used in the toy E2E
// connector path.
service OORMailboxService {
    // SubmitPackage submits an Ark package and returns server co-signed
    // checkpoint PSBTs.
    rpc SubmitPackage (SubmitPackageRequest) returns (SubmitPackageResponse);

    // FinalizePackage submits finalized checkpoint PSBTs for a session.
    rpc FinalizePackage (FinalizePackageRequest)
        returns (FinalizePackageResponse);
}

// OOROutPoint is a protobuf representation of wire.OutPoint.
message OOROutPoint {
    // txid is the 32-byte transaction hash.
    bytes txid = 1;

    // vout is the transaction output index.
    uint32 vout = 2;
}

// OORSigningDescriptor carries the minimal signing metadata required by the
// server OOR actor.
message OORSigningDescriptor {
    // outpoint identifies the input VTXO.
    OOROutPoint outpoint = 1;

    // vtxo_policy_template is the serialized arkscript policy for the spent
    // input VTXO.
    bytes vtxo_policy_template = 2;

    // spend_path is the serialized arkscript spend path selected for the
    // checkpoint spend of the input VTXO.
    bytes spend_path = 3;

    // owner_leaf_policy is the serialized arkscript owner-leaf policy for
    // the checkpoint output created from this input.
    bytes owner_leaf_policy = 4;

    // taproot_asset_root is the optional 32-byte Taproot Asset commitment
    // root anchored in the spent VTXO.
    bytes taproot_asset_root = 5;
}

// OORRecipientOutput carries one Ark recipient output plus optional semantic
// policy metadata for the created VTXO.
message OORRecipientOutput {
    // pk_script is the canonical recipient output script.
    bytes pk_script = 1;

    // value_sat is the output amount in satoshis.
    int64 value_sat = 2;

    // vtxo_policy_template is the serialized arkscript policy for the created
    // output when known.
    bytes vtxo_policy_template = 3;

    // taproot_asset_root is the optional 32-byte Taproot Asset commitment
    // root anchored in this recipient output.
    bytes taproot_asset_root = 4;
}

// SubmitPackageRequest carries submit-phase OOR data.
message SubmitPackageRequest {
    // ark_psbt is the serialized Ark PSBT.
    bytes ark_psbt = 1;

    // checkpoint_psbts are serialized checkpoint PSBTs.
    repeated bytes checkpoint_psbts = 2;

    // signing_descriptors carry per-input signing metadata.
    repeated OORSigningDescriptor signing_descriptors = 3;

    // recipient_outputs carry the canonical Ark recipient outputs plus
    // optional semantic policy metadata for persistence on the operator.
    repeated OORRecipientOutput recipient_outputs = 4;

    // flow_version is the OOR flow version the client conducted this
    // transfer under (the choreography rules, e.g. whether per-input
    // checkpoints are used). The operator validates it at admission and
    // persists it with the session. Every transfer is V1 today; an unset
    // value is treated as V1.
    uint32 flow_version = 5;

    // taproot_asset_transfer is the optional versioned Wavelength container
    // of sealed tap-sdk packages for the checkpoint and Ark transitions.
    bytes taproot_asset_transfer = 6;
}

// OORRejectCode discriminates server-side OOR rejections so clients can
// route on the cause (e.g. fall back to in-round payment) without
// string-matching the human-readable reason. The code space is extended
// over time as additional typed rejections are introduced.
enum OORRejectCode {
    // OOR_REJECT_UNSPECIFIED is the zero value. Treated as a generic
    // rejection by the client. Present as the default when the operator
    // returns a failure that does not yet carry a typed code.
    OOR_REJECT_UNSPECIFIED = 0;

    // OOR_REJECT_LINEAGE_TOO_LARGE indicates the cumulative on-chain
    // virtual bytes required to claim the OOR-produced VTXO unilaterally
    // exceeds the operator's configured cap. The submit was not locked
    // and may be retried after the client restructures the input set
    // (e.g. fewer inputs, same-commitment cluster, or in-round fallback).
    OOR_REJECT_LINEAGE_TOO_LARGE = 1;

    // OOR_REJECT_OUTPUT_POLICY indicates one of the Ark recipient
    // outputs violates the operator's output policy, e.g. an amount
    // above the advertised per-VTXO maximum. The submit was not locked;
    // retrying the same output shape will fail again, so the client
    // must restructure the outputs (smaller amounts, more outputs)
    // before resubmitting.
    OOR_REJECT_OUTPUT_POLICY = 2;

    // OOR_REJECT_USER_BALANCE indicates the submit would push a recipient
    // mailbox's aggregate VTXO balance above the operator's advertised
    // MaxUserBalance cap. Unlike OOR_REJECT_OUTPUT_POLICY, retrying the
    // same shape can succeed once the recipient's balance drops (e.g. it
    // spends or refreshes down), so a custodial sender may hold the value
    // and retry later rather than restructuring the outputs.
    OOR_REJECT_USER_BALANCE = 3;

    // OOR_REJECT_INPUT_NOT_SPENDABLE indicates one of the submit's input
    // VTXOs was not in a spendable state on the operator (neither live nor
    // in-flight) at validation time — most commonly because the input's
    // round commitment transaction has not yet reached the operator's
    // confirmation target, even though the client already observed the
    // confirmation. The submit was not locked. Unlike OOR_REJECT_OUTPUT_POLICY
    // this is transient: retrying the same shape succeeds once the operator's
    // chain view catches up, so the client should wait (see server_best_height)
    // and resubmit rather than restructuring the transfer.
    OOR_REJECT_INPUT_NOT_SPENDABLE = 4;
}

// SubmitPackageRejection carries a typed rejection of an OOR submit.
message SubmitPackageRejection {
    // code discriminates the rejection cause.
    OORRejectCode code = 1;

    // reason is a human-readable explanation suitable for logs/UX.
    string reason = 2;

    // session_id is the 32-byte session hash echoed back from the rejected
    // submit so the client can route the failure to the correct OOR
    // session FSM. Without this echo, a server-side rejection delivered via
    // the durable EventRouter dispatch path has no way to identify which
    // session to fail, and the ingress dispatcher would stall the cursor on
    // the rejected envelope.
    bytes session_id = 3;

    // server_best_height is the operator's current best block height at the
    // time of the rejection, or 0 when the operator did not populate it. It is
    // a diagnostic hint for transient rejections (notably
    // OOR_REJECT_INPUT_NOT_SPENDABLE): a value below the input's confirmation
    // height confirms the operator is simply behind on chain sync rather than
    // rejecting for a genuine reason. It is informational only — clients route
    // their retry on the typed code, not on this value.
    uint32 server_best_height = 4;
}

// SubmitPackageResponse carries server submit-phase results. Exactly one of
// the success or rejection branches is set.
message SubmitPackageResponse {
    oneof result {
        SubmitPackageSuccess success = 1;
        SubmitPackageRejection rejection = 2;
    }
}

// SubmitPackageSuccess is the successful sub-message of SubmitPackageResponse.
message SubmitPackageSuccess {
    // session_id is the 32-byte session hash.
    bytes session_id = 1;

    // co_signed_checkpoint_psbts are serialized server-co-signed checkpoint
    // PSBTs.
    repeated bytes co_signed_checkpoint_psbts = 2;

    // co_signed_ark_psbt is the serialized Ark PSBT after the server has
    // attached its operator-side signature material. Clients persist this exact
    // PSBT so unilateral recovery can reconstruct a spendable OOR lineage if
    // the cooperative path is unavailable later.
    bytes co_signed_ark_psbt = 3;
}

// FinalizePackageRequest carries finalize-phase OOR data.
message FinalizePackageRequest {
    // session_id is the 32-byte session hash.
    bytes session_id = 1;

    // final_checkpoint_psbts are serialized finalized checkpoint PSBTs.
    repeated bytes final_checkpoint_psbts = 2;
}

// FinalizePackageResponse carries finalize-phase OOR results.
message FinalizePackageResponse {
    // session_id is the 32-byte session hash.
    bytes session_id = 1;
}
