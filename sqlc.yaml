version: "2"
sql:
  - engine: "postgresql"
    schema: "db/sqlc/migrations"
    queries: "db/sqlc/queries"
    gen:
      go:
        out: db/sqlc
        package: sqlc
        emit_interface: true
        emit_exported_queries: true
  - engine: "postgresql"
    schema: "sdk/swaps/migrations"
    queries: "sdk/swaps/queries"
    gen:
      go:
        out: sdk/swaps/sqlc
        package: sqlc
        emit_interface: true
        emit_exported_queries: true
