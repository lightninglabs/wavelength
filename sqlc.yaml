version: "2"
sql:
  - engine: "postgresql"
    schema: "db/sqlc/migrations"
    queries: "db/sqlc/queries"
    gen:
      go:
        out: db/sqlc
        package: sqlc
        emit_interface: true
        emit_exported_queries: true
  - engine: "postgresql"
    schema: "db/actordelivery/migrations"
    queries: "db/actordelivery/queries"
    gen:
      go:
        out: db/actordelivery/sqlc
        package: sqlc
        emit_interface: true
        emit_exported_queries: true
