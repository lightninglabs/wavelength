syntax = "proto3";

package daemonrpc;

option go_package = "github.com/lightninglabs/darepo-client/daemonrpc";

// DaemonService is the client daemon's own gRPC API. External tools such as
// CLI wallets and GUIs connect to this service to interact with the running
// daemon.
service DaemonService {
    // GetInfo returns basic status information about the running daemon
    // including version, network, lnd connection state, and server
    // connection state.
    rpc GetInfo (GetInfoRequest) returns (GetInfoResponse);

    // GenSeed generates a new aezeed cipher seed mnemonic. This is the
    // first step when creating a new lwwallet-backed wallet. The returned
    // mnemonic must be passed to InitWallet to finalize wallet creation.
    // Only available in lwwallet mode.
    rpc GenSeed (GenSeedRequest) returns (GenSeedResponse);

    // InitWallet creates a new wallet from a previously generated aezeed
    // mnemonic. The wallet is encrypted at rest with the provided
    // password. Only available in lwwallet mode when no wallet exists.
    rpc InitWallet (InitWalletRequest) returns (InitWalletResponse);

    // UnlockWallet decrypts an existing wallet seed using the provided
    // password and starts the wallet subsystem. Only available in
    // lwwallet mode when the wallet is locked.
    rpc UnlockWallet (UnlockWalletRequest) returns (UnlockWalletResponse);

    // GetBalance returns the current balance of the wallet, broken down
    // by boarding (on-chain) and VTXO (off-chain) balances.
    rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse);

    // ListVTXOs returns the set of VTXOs known to the wallet, optionally
    // filtered by status and minimum amount.
    rpc ListVTXOs (ListVTXOsRequest) returns (ListVTXOsResponse);

    // NewAddress generates a new boarding address that can receive
    // on-chain funds for use in the Ark protocol.
    rpc NewAddress (NewAddressRequest) returns (NewAddressResponse);

    // NewReceiveScript allocates a fresh wallet key, registers the
    // matching taproot receive script with the indexer, and returns the
    // script details needed to hand the destination to a sender.
    rpc NewReceiveScript (NewReceiveScriptRequest)
        returns (NewReceiveScriptResponse);

    // ReceiveAuthKey returns the per-payment receive-auth public key.
    rpc ReceiveAuthKey (ReceiveAuthKeyRequest) returns (ReceiveAuthKeyResponse);

    // SignReceiveAuthMessage signs one message with the per-payment
    // receive-auth key.
    rpc SignReceiveAuthMessage (SignReceiveAuthMessageRequest)
        returns (SignReceiveAuthMessageResponse);

    // SignReceiveAuthMessageCompact signs one message with the
    // per-payment receive-auth key and returns a compact signature.
    rpc SignReceiveAuthMessageCompact (SignReceiveAuthMessageCompactRequest)
        returns (SignReceiveAuthMessageCompactResponse);

    // ReceiveAuthECDH derives one Sphinx shared secret with the
    // per-payment receive-auth key.
    rpc ReceiveAuthECDH (ReceiveAuthECDHRequest)
        returns (ReceiveAuthECDHResponse);

    // GetIndexedVTXOByPkScript queries the authoritative indexer for the
    // first VTXO matching the given script and status filter.
    rpc GetIndexedVTXOByPkScript (GetIndexedVTXOByPkScriptRequest)
        returns (GetIndexedVTXOByPkScriptResponse);

    // GetIndexedOORSessionByTxid queries the authoritative indexer for one
    // OOR session using a spent script proof and deterministic session txid.
    rpc GetIndexedOORSessionByTxid (GetIndexedOORSessionByTxidRequest)
        returns (GetIndexedOORSessionByTxidResponse);

    // SendVTXO initiates an in-round transfer by submitting a refresh
    // request to the round coordinator. The transfer completes when the
    // next round commits.
    rpc SendVTXO (SendVTXORequest) returns (SendVTXOResponse);

    // SendOOR initiates an out-of-round transfer directly between the
    // client and operator, without waiting for a round.
    rpc SendOOR (SendOORRequest) returns (SendOORResponse);

    // RefreshVTXOs queues one or more VTXOs for refresh in the next
    // round. This extends their expiry without changing ownership.
    rpc RefreshVTXOs (RefreshVTXOsRequest) returns (RefreshVTXOsResponse);

    // LeaveVTXOs queues one or more VTXOs for cooperative leave
    // (offboard) in the next round. Each VTXO is forfeited and the
    // forfeited amount (minus the quoted per-input operator fee)
    // lands as an on-chain output at the specified destination.
    rpc LeaveVTXOs (LeaveVTXOsRequest) returns (LeaveVTXOsResponse);

    // Board triggers the client to join the next round with any
    // confirmed boarding UTXOs. This sends IntentRequested to
    // the round FSM, which emits a JoinRoundRequest to the server.
    rpc Board (BoardRequest) returns (BoardResponse);

    // JoinNextRound asks the client round FSM to commit any currently
    // queued round intents and emit a JoinRoundRequest to the operator.
    // Useful after queueing refresh or leave intents that intentionally
    // batch in PendingRoundAssembly. The proto name avoids collision with
    // roundpb.JoinRoundRequest, which is the underlying wire message the
    // round FSM emits to the operator once this RPC fires.
    rpc JoinNextRound (JoinNextRoundRequest) returns (JoinNextRoundResponse);

    // SweepBoardingUTXOs sweeps boarding UTXOs whose CSV timeout path is
    // mature back to the wallet.
    rpc SweepBoardingUTXOs (SweepBoardingUTXOsRequest)
        returns (SweepBoardingUTXOsResponse);

    // ListBoardingSweeps returns persisted aggregate boarding sweep
    // transactions and their tracked inputs.
    rpc ListBoardingSweeps (ListBoardingSweepsRequest)
        returns (ListBoardingSweepsResponse);

    // ListRounds returns the current state of all round FSM instances.
    // Each round is identified by its round ID (or a temporary key if
    // the server hasn't assigned one yet).
    rpc ListRounds (ListRoundsRequest) returns (ListRoundsResponse);

    // GetRound returns one known round by server-assigned round ID. The
    // response includes the live FSM state when the round is still in
    // memory, or the persisted SQL status and artifacts for completed
    // rounds.
    rpc GetRound (GetRoundRequest) returns (GetRoundResponse);

    // WatchRounds opens a server-streaming connection that pushes
    // round state updates as they occur. The stream stays open until
    // the client disconnects.
    rpc WatchRounds (WatchRoundsRequest) returns (stream WatchRoundsResponse);

    // ListOORSessions returns locally known out-of-round transfer sessions.
    // Pending and failed sessions come from the durable OOR actor; completed
    // sessions come from persisted OOR package artifacts.
    rpc ListOORSessions (ListOORSessionsRequest)
        returns (ListOORSessionsResponse);

    // GetOORSession returns one locally known out-of-round transfer session.
    rpc GetOORSession (GetOORSessionRequest) returns (GetOORSessionResponse);

    // EstimateFee returns a fee breakdown for a given VTXO amount at
    // the operator's current rates and utilization. The daemon proxies
    // this to the server's EstimateFee RPC.
    rpc EstimateFee (EstimateFeeRequest) returns (EstimateFeeResponse);

    // GetFeeHistory returns paginated fee ledger entries from the
    // client's local accounting database.
    rpc GetFeeHistory (GetFeeHistoryRequest) returns (GetFeeHistoryResponse);

    // ListTransactions returns a paginated transaction history from
    // the client's local accounting and sweep databases.
    rpc ListTransactions (ListTransactionsRequest)
        returns (ListTransactionsResponse);

    // Unroll triggers a unilateral exit for the specified VTXO outpoint.
    // The daemon will assemble the recovery proof, spawn a durable unroll
    // job, and drive the on-chain recovery process to completion.
    rpc Unroll (UnrollRequest) returns (UnrollResponse);

    // GetUnrollStatus returns the current status of an unroll job for the
    // specified VTXO outpoint, including recovery chain progress and
    // sweep state.
    rpc GetUnrollStatus (GetUnrollStatusRequest)
        returns (GetUnrollStatusResponse);
}

// WalletState mirrors the daemon's in-process wallet lifecycle enum:
// callers should test the specific state they need. SYNCING and READY
// both mean seed material is loaded, while only READY means wallet RPCs
// are fully usable.
enum WalletState {
    // WALLET_STATE_UNSPECIFIED is the proto3 zero value. The daemon
    // never emits this; reserved so a missing field deserializes to a
    // safe non-ready state.
    WALLET_STATE_UNSPECIFIED = 0;

    // WALLET_STATE_NONE indicates no wallet has been created yet (no
    // encrypted seed on disk).
    WALLET_STATE_NONE = 1;

    // WALLET_STATE_LOCKED indicates an encrypted seed file exists but
    // no decryption key has been provided; signing is not yet
    // available.
    WALLET_STATE_LOCKED = 2;

    // WALLET_STATE_READY indicates the wallet is initialized, unlocked,
    // and ready to sign / participate in rounds.
    WALLET_STATE_READY = 3;

    // WALLET_STATE_SYNCING indicates the wallet is unlocked and the
    // backing chain source is catching up before wallet RPCs are safe.
    WALLET_STATE_SYNCING = 4;
}

message GetInfoRequest {
}

message GetInfoResponse {
    // version is the daemon's semantic version string.
    string version = 1;

    // commit is the short git commit hash of this build.
    string commit = 2;

    // network is the active bitcoin network (mainnet, testnet, regtest,
    // etc.).
    string network = 3;

    // lnd_identity_pubkey is the hex-encoded public identity key of the
    // connected lnd node, used for Lightning Network peer identity and
    // connectivity. Empty in lwwallet mode. This key is distinct from
    // identity_pubkey and must not be substituted for Ark/OOR signing.
    string lnd_identity_pubkey = 4;

    // block_height is the current best block height known to the daemon.
    uint32 block_height = 5;

    // server_connected indicates whether the mailbox transport to the ark
    // operator is active and pulling envelopes. This is currently a
    // best-effort runtime signal and may lag reconnect handling until
    // dedicated mailbox connection state is wired through.
    bool server_connected = 6;

    // lnd_alias is the alias of the connected lnd node. Empty in lwwallet
    // mode.
    string lnd_alias = 7;

    // wallet_type is the active wallet backend: "lnd" or "lwwallet".
    string wallet_type = 8;

    // wallet_state is the lifecycle state of the wallet subsystem.
    // Callers should test explicit enum values instead of relying on
    // numeric ordering: READY is fully usable, SYNCING is unlocked but
    // waiting for the chain backend, LOCKED still needs the wallet
    // password, and NONE has no wallet seed on disk.
    WalletState wallet_state = 9;

    // identity_pubkey is the hex-encoded daemon wallet identity public key
    // derived from the active wallet backend's daemon identity key locator
    // (family 6, index 0). This key is the signing identity for Ark round
    // participation, indexer proof submission, and OOR transaction
    // authorization. In lnd mode it is derived through lnd's WalletKit/Signer
    // and may match the connected lnd node identity key in standard
    // local-wallet configurations. API consumers should still treat
    // identity_pubkey as the Ark/OOR signing key and lnd_identity_pubkey as
    // Lightning peer identity only.
    string identity_pubkey = 10;

    // server_info contains cached operator terms fetched from the Ark
    // server during daemon bootstrap. It is empty until the daemon has
    // connected to the operator and learned its current policy. The
    // current daemon implementation does not yet refresh this snapshot
    // after bootstrap, so callers should treat it as the latest known
    // terms for the current session.
    ServerInfo server_info = 11;
}

// ServerInfo contains operator terms and metadata fetched from the Ark
// server's GetInfo RPC. These values govern round participation and
// boarding policy. A max_boarding_amount value of zero means the
// operator currently advertises no upper cap.
message ServerInfo {
    // operator_pubkey is the compressed SEC-encoded public key of the
    // Ark operator.
    bytes operator_pubkey = 1;

    // boarding_exit_delay is the minimum CSV delay for boarding outputs.
    uint32 boarding_exit_delay = 2;

    // vtxo_exit_delay is the minimum CSV delay for VTXO outputs.
    uint32 vtxo_exit_delay = 3;

    // forfeit_script is the raw serialized scriptPubKey for the penalty
    // output clients must use in forfeit transactions.
    bytes forfeit_script = 4;

    // sweep_key is the compressed SEC-encoded public key used in VTXO
    // sweep paths when present.
    bytes sweep_key = 5;

    // sweep_delay is the batch-wide absolute timelock in blocks.
    uint32 sweep_delay = 6;

    // dust_limit is the minimum output value accepted by the operator.
    uint64 dust_limit = 7;

    // min_boarding_amount is the smallest boarding amount the operator
    // accepts.
    uint64 min_boarding_amount = 8;

    // max_boarding_amount is the largest boarding amount the operator
    // accepts. A value of zero means no cap.
    uint64 max_boarding_amount = 9;

    // fee_rate is the operator's target package feerate in sat/vbyte.
    uint64 fee_rate = 10;

    // min_operator_fee is the minimum operator fee in satoshis.
    uint64 min_operator_fee = 11;

    // min_confirmations is the minimum confirmations required on
    // boarding inputs.
    uint32 min_confirmations = 12;
}

message GenSeedRequest {
    // seed_passphrase is an optional passphrase that protects the aezeed
    // mnemonic itself. This is distinct from the wallet password that
    // encrypts the seed at rest on disk.
    bytes seed_passphrase = 1;
}

message GenSeedResponse {
    // mnemonic is the 24-word aezeed mnemonic encoding the generated
    // seed.
    repeated string mnemonic = 1;

    // enciphered_seed is the raw enciphered seed bytes for advanced use
    // cases. Most callers should use the mnemonic field.
    bytes enciphered_seed = 2;
}

message InitWalletRequest {
    // mnemonic is the 24-word aezeed mnemonic returned by GenSeed (or
    // provided for wallet recovery).
    repeated string mnemonic = 1;

    // wallet_password is the password used to encrypt the seed at rest on
    // disk. Must be at least 8 bytes.
    bytes wallet_password = 2;

    // seed_passphrase is the optional passphrase that was used when
    // generating the aezeed mnemonic. Must match the value passed to
    // GenSeed.
    bytes seed_passphrase = 3;
}

message InitWalletResponse {
    // identity_pubkey is the hex-encoded daemon wallet identity public key
    // derived from the newly created wallet. This is the same key
    // reported by GetInfoResponse.identity_pubkey and used for Ark/OOR
    // signing flows.
    string identity_pubkey = 1;
}

message UnlockWalletRequest {
    // wallet_password is the password used to decrypt the seed stored on
    // disk.
    bytes wallet_password = 1;
}

message UnlockWalletResponse {
    // identity_pubkey is the hex-encoded daemon wallet identity public key
    // of the unlocked wallet. This is the same key reported by
    // GetInfoResponse.identity_pubkey and used for Ark/OOR signing flows.
    string identity_pubkey = 1;
}

message GetBalanceRequest {
}

message GetBalanceResponse {
    // boarding_confirmed_sat is the total confirmed balance in boarding
    // addresses (on-chain, waiting to be swept into VTXOs).
    int64 boarding_confirmed_sat = 1;

    // boarding_unconfirmed_sat is the total unconfirmed balance in
    // boarding addresses.
    int64 boarding_unconfirmed_sat = 2;

    // vtxo_balance_sat is the total balance held in live (spendable)
    // VTXOs.
    int64 vtxo_balance_sat = 3;

    // total_confirmed_sat is the sum of all confirmed balances
    // (boarding_confirmed_sat + vtxo_balance_sat).
    int64 total_confirmed_sat = 4;

    // onchain_wallet_confirmed_sat is the total confirmed on-chain
    // balance of the backing wallet (all confirmed UTXOs, including
    // sweep proceeds from unilateral exits).
    int64 onchain_wallet_confirmed_sat = 5;

    // boarding_pending_sweep_sat is the total amount of boarding UTXOs
    // included in a published-but-unconfirmed boarding-timeout sweep
    // transaction. These funds are no longer reported under
    // boarding_confirmed_sat and have not yet returned to
    // onchain_wallet_confirmed_sat, so this field surfaces the value
    // currently in flight to the chain.
    int64 boarding_pending_sweep_sat = 6;

    // boarding_swept_sat is the cumulative total of boarding UTXOs
    // recovered via the timeout-path sweep flow (status=swept). This
    // is historical accounting and does not contribute to
    // total_confirmed_sat — once swept the funds reappear under
    // onchain_wallet_confirmed_sat.
    int64 boarding_swept_sat = 7;
}

// VTXOStatus represents the lifecycle state of a virtual transaction
// output.
enum VTXOStatus {
    // VTXO_STATUS_UNSPECIFIED is the default zero value.
    VTXO_STATUS_UNSPECIFIED = 0;

    // VTXO_STATUS_LIVE indicates the VTXO is active and spendable.
    VTXO_STATUS_LIVE = 1;

    // VTXO_STATUS_PENDING_FORFEIT indicates the VTXO has been committed
    // to cooperative consumption and is awaiting forfeit details.
    VTXO_STATUS_PENDING_FORFEIT = 2;

    // VTXO_STATUS_FORFEITING indicates the forfeit transaction has been
    // signed and the VTXO is awaiting confirmation of the new round.
    VTXO_STATUS_FORFEITING = 3;

    // VTXO_STATUS_FORFEITED is terminal: the new round confirmed and
    // this VTXO has been replaced.
    VTXO_STATUS_FORFEITED = 4;

    // VTXO_STATUS_SPENT is terminal: the VTXO was spent via an
    // out-of-round transfer.
    VTXO_STATUS_SPENT = 5;

    // VTXO_STATUS_UNILATERAL_EXIT is terminal: the VTXO has reached critical
    // expiry and is being resolved on-chain.
    VTXO_STATUS_UNILATERAL_EXIT = 6;

    // VTXO_STATUS_FAILED is terminal: an unrecoverable error occurred.
    VTXO_STATUS_FAILED = 7;

    // VTXO_STATUS_SPENDING indicates the VTXO has been claimed for an
    // out-of-round spend but the spend has not yet completed.
    VTXO_STATUS_SPENDING = 8;
}

message VTXO {
    // outpoint is the VTXO's outpoint in "txid:index" format.
    string outpoint = 1;

    // amount_sat is the value of this VTXO in satoshis.
    int64 amount_sat = 2;

    // status is the current lifecycle state of this VTXO.
    VTXOStatus status = 3;

    // batch_expiry is the absolute block height at which the batch-level
    // timelock expires.
    int32 batch_expiry = 4;

    // round_id is the identifier of the round that created this VTXO.
    string round_id = 5;

    // created_height is the block height at which this VTXO was created.
    int32 created_height = 6;

    // relative_expiry is the CSV delay (in blocks) for the unilateral
    // exit path.
    uint32 relative_expiry = 7;

    // pk_script is the hex-encoded taproot output script.
    string pk_script = 8;

    // commitment_txid is the hex-encoded txid of the on-chain commitment
    // transaction anchoring this VTXO's tree.
    string commitment_txid = 9;

    // chain_depth is the number of OOR checkpoint hops between this VTXO
    // and the most recent on-chain commitment. Round-created VTXOs have
    // chain_depth 0.
    uint32 chain_depth = 10;

    // oor_final_checkpoint_psbts are the serialized finalized checkpoint
    // PSBTs that spent this VTXO through an out-of-round package, when
    // available.
    repeated bytes oor_final_checkpoint_psbts = 11;

    // spent_by_txid is the hex-encoded Ark/OOR transaction txid that spent
    // this VTXO through an out-of-round package, when known.
    string spent_by_txid = 12;
}

message ListVTXOsRequest {
    // status_filter restricts the response to VTXOs matching this status.
    // If VTXO_STATUS_UNSPECIFIED (default), all statuses are returned.
    VTXOStatus status_filter = 1;

    // min_amount_sat excludes VTXOs below this value.
    int64 min_amount_sat = 2;
}

message ListVTXOsResponse {
    // vtxos is the list of VTXOs matching the request filters.
    repeated VTXO vtxos = 1;
}

message NewAddressRequest {
}

message NewAddressResponse {
    // address is the bech32m-encoded taproot boarding address.
    string address = 1;
}

message NewReceiveScriptRequest {
    // label is an optional human-readable label stored with the
    // registration on the indexer.
    string label = 1;
}

message NewReceiveScriptResponse {
    // pk_script_hex is the raw taproot output script encoded as hex.
    string pk_script_hex = 1;

    // pubkey_xonly_hex is the 32-byte x-only owner pubkey encoded as hex.
    string pubkey_xonly_hex = 2;

    // key_family is the wallet key family used to derive the receive key.
    uint32 key_family = 3;

    // key_index is the wallet key index used to derive the receive key.
    uint32 key_index = 4;

    // label is the registration label stored with the indexer.
    string label = 5;
}

message ReceiveAuthKeyRequest {
    // payment_hash is the 32-byte Lightning payment hash for the receive
    // swap that will use the derived key.
    bytes payment_hash = 1;
}

message ReceiveAuthKeyResponse {
    // pubkey is the compressed public key for the payment-scoped receive-auth
    // key. The private scalar never leaves the daemon.
    bytes pubkey = 1;
}

message SignReceiveAuthMessageRequest {
    // payment_hash is the 32-byte Lightning payment hash for the receive
    // swap whose receive-auth key signs this message.
    bytes payment_hash = 1;

    // message is the raw message to sign.
    bytes message = 2;

    // double_hash controls whether the message is double-SHA256 hashed before
    // signing. If false, the daemon applies a single SHA256.
    bool double_hash = 3;
}

message SignReceiveAuthMessageResponse {
    // signature is the DER-encoded ECDSA signature.
    bytes signature = 1;
}

message SignReceiveAuthMessageCompactRequest {
    // payment_hash is the 32-byte Lightning payment hash for the receive
    // swap whose receive-auth key signs this message.
    bytes payment_hash = 1;

    // message is the raw message to sign.
    bytes message = 2;

    // double_hash controls whether the message is double-SHA256 hashed before
    // signing. If false, the daemon applies a single SHA256.
    bool double_hash = 3;
}

message SignReceiveAuthMessageCompactResponse {
    // signature is the compact public-key-recoverable ECDSA signature.
    bytes signature = 1;
}

message ReceiveAuthECDHRequest {
    // payment_hash is the 32-byte Lightning payment hash for the receive
    // swap whose receive-auth key derives this shared secret.
    bytes payment_hash = 1;

    // pubkey is the remote compressed public key to use for ECDH.
    bytes pubkey = 2;
}

message ReceiveAuthECDHResponse {
    // shared_secret is the 32-byte Sphinx shared secret.
    bytes shared_secret = 1;
}

message GetIndexedVTXOByPkScriptRequest {
    // pk_script is the raw output script to query.
    bytes pk_script = 1;

    // status_filter restricts the indexer query to matching lifecycle
    // states. If empty, all statuses are considered.
    repeated VTXOStatus status_filter = 2;
}

message GetIndexedVTXOByPkScriptResponse {
    // vtxo is the first matching VTXO, when found.
    VTXO vtxo = 1;
}

message GetIndexedOORSessionByTxidRequest {
    // pk_script is the spent script used to authorize the indexed lookup.
    bytes pk_script = 1;

    // session_txid is the deterministic Ark/OOR session txid to fetch.
    bytes session_txid = 2;
}

message GetIndexedOORSessionByTxidResponse {
    // ark_psbt is the serialized Ark PSBT for the indexed OOR session.
    bytes ark_psbt = 1;

    // checkpoint_psbts are the serialized finalized checkpoint PSBTs for
    // the indexed OOR session.
    repeated bytes checkpoint_psbts = 2;
}

// Output describes a single recipient in a send operation.
message Output {
    oneof destination {
        // address is the recipient's bech32m-encoded taproot address.
        string address = 1;

        // pubkey is the 32-byte x-only (Schnorr) public key of the
        // recipient. For OOR sends, this derives a VTXO-compatible
        // taproot output using the operator's collab key and exit
        // delay, so the recipient gets a standard Ark VTXO.
        bytes pubkey = 3;

        // policy_template is the serialized arkscript policy for the
        // recipient. The daemon derives the concrete pk_script from
        // this semantic destination, and APIs that need a collaborative
        // owner key require the template to use the standard Ark VTXO
        // shape.
        bytes policy_template = 4;
    }

    // amount_sat is the value to send in satoshis.
    int64 amount_sat = 2;

    // vtxo_policy_template is the serialized arkscript policy for the
    // created output when the caller knows semantic ownership metadata
    // that is not already carried by the destination itself.
    bytes vtxo_policy_template = 5;
}

message SendVTXORequest {
    // recipients is the list of outputs to create in the next round.
    repeated Output recipients = 1;

    // dry_run validates the request without submitting it to the round
    // coordinator. When true, the response contains a preview of the
    // operation.
    bool dry_run = 2;
}

message SendVTXOResponse {
    // status is the result: "submitted" on success, "preview" on
    // dry_run.
    string status = 1;

    // round_id is the identifier of the round this send was submitted
    // to. Empty on dry_run.
    string round_id = 2;

    // total_amount_sat is the total amount being sent (sum of
    // recipients).
    int64 total_amount_sat = 3;

    // change_amount_sat is the change returned to the sender. Zero if
    // the selected VTXOs exactly covered the total.
    int64 change_amount_sat = 4;

    // selected_count is the number of VTXOs selected as inputs for
    // this send.
    int32 selected_count = 5;
}

message SendOORRequest {
    // recipient is the output to create via the out-of-round transfer.
    Output recipient = 1;

    // dry_run validates the request without initiating the transfer.
    bool dry_run = 2;

    // custom_inputs overrides wallet VTXO selection. When set, the
    // daemon uses these pre-specified inputs instead of selecting from
    // the wallet. This enables non-standard spend paths like vHTLC
    // claims.
    repeated CustomOORInput custom_inputs = 3;

    // idempotency_key is an optional caller-provided key that identifies
    // this send intent across crashes and retries. Reusing the same key
    // allows the daemon to return the existing local OOR session instead
    // of creating a duplicate transfer.
    string idempotency_key = 4;
}

// CustomOORInput specifies a VTXO to spend with an explicit semantic policy
// and selected spend path.
message CustomOORInput {
    // outpoint identifies the VTXO to spend in "txid:vout" format.
    string outpoint = 1;

    // vtxo_policy_template is the serialized arkscript policy for the spent
    // input VTXO. When empty, the daemon derives the standard Ark policy from
    // the local descriptor.
    bytes vtxo_policy_template = 2;

    // spend_path is the serialized arkscript spend path selected for the
    // checkpoint spend of the input VTXO.
    bytes spend_path = 3;

    // amount_sat is the VTXO value in satoshis.
    int64 amount_sat = 4;

    // pk_script is the VTXO taproot output script.
    bytes pk_script = 5;
}

message SendOORResponse {
    // status is the result: "submitted" on success, "preview" on
    // dry_run.
    string status = 1;

    // session_id is the OOR session identifier. Empty on dry_run.
    string session_id = 2;
}

// OutpointSelection wraps a list of outpoint strings for use inside a
// oneof field, since proto3 does not allow repeated fields directly in
// a oneof.
message OutpointSelection {
    // outpoints lists specific VTXOs in "txid:index" format.
    repeated string outpoints = 1;
}

message RefreshVTXOsRequest {
    oneof selection {
        // outpoints lists specific VTXOs to refresh, in "txid:index"
        // format.
        OutpointSelection outpoints = 1;

        // all refreshes every live VTXO when true.
        bool all = 2;
    }

    // dry_run validates the request without queuing the refresh.
    bool dry_run = 3;
}

message RefreshVTXOsResponse {
    // queued_outpoints lists the outpoints that were successfully queued
    // for refresh.
    repeated string queued_outpoints = 1;

    // status is the result: "queued" on success, "preview" on dry_run.
    string status = 2;
}

// LeaveDestination describes where a single leave output should land.
// Unlike Output (used for VTXO sends), leave destinations are on-chain
// and carry no VTXO-shape constraints: any standard address or
// recognised raw pkScript is acceptable.
message LeaveDestination {
    oneof target {
        // address is the bech32m/base58 on-chain recipient. The daemon
        // decodes it via btcutil.DecodeAddress using its configured
        // chain params, so cross-network addresses are rejected.
        string address = 1;

        // pk_script is the raw output script to pay. Useful when the
        // caller has already resolved the script (custom policies,
        // OP_RETURN exits, etc.) and does not want address re-encoding.
        // The daemon caps the script at txscript.MaxScriptSize, rejects
        // the BIP 431 P2A anchor pattern, and whitelists standard
        // classes (P2PKH, P2SH, P2WPKH, P2WSH, P2TR, P2PK, multisig,
        // OP_RETURN). Network binding is the caller's responsibility on
        // this branch — pkScripts are network-agnostic, so the daemon
        // does not (and cannot) re-bind them to its chain params.
        bytes pk_script = 2;
    }
}

message LeaveVTXOsRequest {
    oneof selection {
        // outpoints lists specific VTXOs to leave, in "txid:index"
        // format.
        OutpointSelection outpoints = 1;

        // all leaves every live VTXO when true. Per-outpoint overrides
        // are rejected under this selection because the daemon does
        // not know the outpoint set ahead of time.
        bool all = 2;
    }

    // default_destination applies to every selected outpoint that is
    // not overridden in destinations. Required whenever selection=all,
    // or whenever any selected outpoint is not present in the
    // destinations map.
    LeaveDestination default_destination = 3;

    // destinations overrides the default destination on a per-outpoint
    // basis. The key is the outpoint in "txid:index" format. Only
    // honored when selection=outpoints; the RPC rejects non-empty
    // overrides combined with selection=all.
    map<string, LeaveDestination> destinations = 4;

    // dry_run validates the request without queuing the leave.
    bool dry_run = 5;
}

message LeaveVTXOsResponse {
    // queued_outpoints lists the outpoints that were successfully
    // queued for leave.
    repeated string queued_outpoints = 1;

    // status is the result: "queued" on success, "preview" on dry_run.
    string status = 2;
}

message BoardRequest {
    // target_vtxo_count asks the daemon to fan the confirmed boarding
    // balance out into this many VTXO outputs in the next round. Zero
    // preserves the legacy behavior of creating one boarded VTXO.
    uint32 target_vtxo_count = 1;

    // no_persist opts out of restart-safe Board replay. When set, the
    // daemon does NOT persist the user's intent to pending_board_requests,
    // so a crash between Board admission and round seal silently drops
    // the request rather than re-issuing it on the next start. Default
    // (false) is the safe behavior: the daemon persists each admitted
    // confirmed outpoint and replays the Board through the wallet's
    // self-Tell on startup until the round adopts or the user fires a
    // fresh Board.
    bool no_persist = 2;
}

message BoardResponse {
    // status is "registered" on success, "no_boarding_utxos" if
    // nothing to board.
    string status = 1;

    // vtxo_count is the number of VTXO target outputs accepted for
    // boarding. It is zero when status is "no_boarding_utxos".
    uint32 vtxo_count = 2;
}

message JoinNextRoundRequest {
}

message JoinNextRoundResponse {
    // status is "joined" when the round FSM accepted the request and emitted
    // JoinRoundRequest to the operator. The actual round outcome is observed
    // asynchronously via ListRounds / WatchRounds and the per-VTXO status.
    string status = 1;
}

message SweepBoardingUTXOsRequest {
    // outpoints optionally restricts sweeping to specific boarding UTXOs,
    // formatted as "txid:index". Empty means scan all sweepable boarding
    // intents.
    repeated string outpoints = 1;

    // broadcast makes the RPC publish one aggregate sweep transaction and
    // record it as pending confirmation. The daemon marks boarding intents
    // swept only after the chain backend reports their outpoints as spent.
    // The default false value only previews candidates, totals, and fees.
    bool broadcast = 2;

    // fee_rate_sat_per_vbyte optionally overrides fee estimation. A zero value
    // asks the daemon to estimate a fee rate from conf_target.
    int64 fee_rate_sat_per_vbyte = 3;

    // conf_target is the target confirmation count used for fee estimation.
    // A zero value uses the daemon default.
    uint32 conf_target = 4;

    // sweep_address optionally overrides the destination for the aggregate
    // sweep. Empty means sweep into a fresh wallet address.
    string sweep_address = 5;
}

message BoardingSweepOutput {
    // outpoint is the boarding UTXO that can be swept.
    string outpoint = 1;

    // amount_sat is the value of the boarding UTXO.
    int64 amount_sat = 2;

    // maturity_height is the first block height at which the CSV timeout path
    // can be spent.
    int32 maturity_height = 3;
}

message SweepBoardingUTXOsResponse {
    // status is "preview", "published", or "failed".
    string status = 1;

    // current_height is the best chain height used for the maturity scan.
    int32 current_height = 2;

    // sweepable_outputs contains the mature boarding UTXOs included in the
    // aggregate sweep preview or broadcast.
    repeated BoardingSweepOutput sweepable_outputs = 3;

    // total_amount_sat is the total value of all sweepable outputs.
    int64 total_amount_sat = 4;

    // estimated_fee_sat is the fee required for the aggregate sweep
    // transaction at fee_rate_sat_per_vbyte.
    int64 estimated_fee_sat = 5;

    // net_amount_sat is total_amount_sat minus estimated_fee_sat.
    int64 net_amount_sat = 6;

    // fee_rate_sat_per_vbyte is the fee rate used to build the aggregate
    // sweep.
    int64 fee_rate_sat_per_vbyte = 7;

    // conf_target is the confirmation target used when fee estimation was
    // requested.
    uint32 conf_target = 8;

    // txid is the aggregate sweep transaction id. Preview responses set the
    // txid of the signed transaction built for the current request; a later
    // broadcast can differ if inputs, fees, or destination change.
    string txid = 9;

    // fee_paid_sat is set when broadcast=true and records the actual fee paid
    // by the aggregate sweep transaction. The fee is known at publication;
    // confirmation is tracked asynchronously by the daemon.
    int64 fee_paid_sat = 10;

    // tx_vbytes is the virtual byte size of the signed aggregate sweep
    // transaction.
    int64 tx_vbytes = 11;

    // failure_reason carries aggregate build, broadcast, or persistence
    // errors.
    string failure_reason = 12;
}

message ListBoardingSweepsRequest {
    // status optionally filters tracked sweeps by persisted status:
    // "pending", "published", "confirmed", "external_resolved", or
    // "failed". Empty lists all.
    string status = 1;

    // page_size limits the number of sweeps returned. Zero uses the daemon
    // default.
    uint32 page_size = 2;

    // page_token is the opaque token returned by a previous response.
    string page_token = 3;
}

message BoardingSweepInput {
    // outpoint is the boarding UTXO tracked by this sweep.
    string outpoint = 1;

    // amount_sat is the value of the boarding UTXO.
    int64 amount_sat = 2;

    // status is the persisted per-input status: "pending", "published",
    // "spent", "external_spent", or "failed".
    string status = 3;

    // spent_by_txid is set after the chain backend reports a confirmed spend.
    string spent_by_txid = 4;

    // spent_height is the block height of the confirmed spend when known.
    int32 spent_height = 5;
}

message BoardingSweep {
    // txid is the aggregate sweep transaction id.
    string txid = 1;

    // status is the persisted aggregate status: "pending", "published",
    // "confirmed", "external_resolved", or "failed".
    string status = 2;

    // destination_address is the caller-specified sweep address, if any.
    string destination_address = 3;

    // total_amount_sat is the total value of every sweep input.
    int64 total_amount_sat = 4;

    // fee_paid_sat is the fee paid by the aggregate sweep transaction.
    int64 fee_paid_sat = 5;

    // fee_rate_sat_per_vbyte is the fee rate used to build the sweep.
    int64 fee_rate_sat_per_vbyte = 6;

    // tx_vbytes is the virtual byte size of the sweep transaction.
    int64 tx_vbytes = 7;

    // created_height is the best chain height when the sweep was created.
    int32 created_height = 8;

    // confirmed_height is set once every tracked input has confirmed spent.
    int32 confirmed_height = 9;

    // inputs contains the boarding outpoints tracked by this sweep.
    repeated BoardingSweepInput inputs = 10;

    // failure_reason carries the terminal local failure reason for failed
    // sweeps.
    string failure_reason = 11;
}

message ListBoardingSweepsResponse {
    // sweeps are returned newest first by creation time.
    repeated BoardingSweep sweeps = 1;

    // next_page_token is set when another page is available.
    string next_page_token = 2;
}

// RoundState represents the lifecycle state of a client's round FSM.
enum RoundState {
    // ROUND_STATE_UNKNOWN is the default zero value.
    ROUND_STATE_UNKNOWN = 0;

    // ROUND_STATE_IDLE indicates the FSM is waiting for boarding
    // intents or VTXO requests.
    ROUND_STATE_IDLE = 1;

    // ROUND_STATE_PENDING_ASSEMBLY indicates boarding intents or VTXO
    // requests have arrived but registration has not been triggered.
    ROUND_STATE_PENDING_ASSEMBLY = 2;

    // ROUND_STATE_REGISTRATION_SENT indicates a JoinRoundRequest has
    // been sent to the server and the client is awaiting acceptance.
    ROUND_STATE_REGISTRATION_SENT = 3;

    // ROUND_STATE_JOINED indicates the server accepted the join and
    // the client is waiting for the commitment transaction.
    ROUND_STATE_JOINED = 4;

    // ROUND_STATE_COMMITMENT_RECEIVED indicates the commitment
    // transaction has been received and is being validated.
    ROUND_STATE_COMMITMENT_RECEIVED = 5;

    // ROUND_STATE_COMMITMENT_VALIDATED indicates the commitment
    // transaction passed validation and is ready for MuSig2 signing.
    ROUND_STATE_COMMITMENT_VALIDATED = 6;

    // ROUND_STATE_FORFEIT_COLLECTING indicates the client is
    // collecting forfeit signatures from VTXO actors.
    ROUND_STATE_FORFEIT_COLLECTING = 7;

    // ROUND_STATE_NONCES_SENT indicates MuSig2 nonces have been sent
    // to the server.
    ROUND_STATE_NONCES_SENT = 8;

    // ROUND_STATE_NONCES_AGGREGATED indicates aggregated nonces have
    // been received from the server.
    ROUND_STATE_NONCES_AGGREGATED = 9;

    // ROUND_STATE_PARTIAL_SIGS_SENT indicates partial signatures have
    // been sent to the server.
    ROUND_STATE_PARTIAL_SIGS_SENT = 10;

    // ROUND_STATE_INPUT_SIG_SENT indicates the boarding input
    // signature has been sent.
    ROUND_STATE_INPUT_SIG_SENT = 11;

    // ROUND_STATE_CONFIRMED is terminal: the round completed
    // successfully.
    ROUND_STATE_CONFIRMED = 12;

    // ROUND_STATE_FAILED is terminal: the round failed.
    ROUND_STATE_FAILED = 13;

    // ROUND_STATE_RECOVERY indicates CSV recovery is in progress.
    ROUND_STATE_RECOVERY = 14;

    // ROUND_STATE_QUOTE_RECEIVED indicates the client has received
    // the server's seal-time JoinRoundQuote (#270) and is deciding
    // whether to accept or reject it. Between REGISTRATION_SENT
    // (intent sent, awaiting admission + quote) and JOINED (quote
    // accepted, awaiting commitment tx).
    ROUND_STATE_QUOTE_RECEIVED = 15;
}

// RoundVTXOInfo describes a VTXO created in a round.
message RoundVTXOInfo {
    // outpoint is the VTXO's outpoint in "txid:index" format.
    string outpoint = 1;

    // amount_sat is the value of this VTXO in satoshis.
    int64 amount_sat = 2;
}

// RoundInfo describes the current state of a single round FSM
// instance.
message RoundInfo {
    // round_id is the server-assigned round identifier. Empty for
    // temp-keyed rounds that haven't received a server response yet.
    string round_id = 1;

    // state is the current FSM state.
    RoundState state = 2;

    // is_temp indicates this round has a temporary key and hasn't
    // been assigned a server round ID yet.
    bool is_temp = 3;

    // vtxos lists the VTXOs created by this round. Only populated
    // for persisted rounds (input_sig_sent, confirmed). Empty for
    // pending/in-memory rounds.
    repeated RoundVTXOInfo vtxos = 4;

    // commitment_txid is the round commitment transaction id when the round
    // has been persisted.
    string commitment_txid = 5;

    // commitment_height is the block height that confirmed the commitment
    // transaction, when known.
    int32 commitment_height = 6;

    // creation_time is the Unix timestamp when the persisted round row was
    // first created.
    int64 creation_time = 7;

    // last_update_time is the Unix timestamp when the persisted round row
    // was last updated.
    int64 last_update_time = 8;

    // input_outpoints lists locally known inputs associated with this round.
    // For boarding rounds this includes locally persisted boarding inputs.
    repeated string input_outpoints = 9;

    // output_outpoints lists locally known VTXO outpoints created by this
    // round.
    repeated string output_outpoints = 10;

    // failure_reason contains the live FSM failure reason when available.
    // Historical failed rounds loaded only from persistence leave this empty.
    string failure_reason = 11;
}

message ListRoundsRequest {
    // page_size is the maximum number of persisted rounds to return.
    // If zero, the server uses a default page size. Pending
    // (in-memory) rounds are always returned and do not count
    // against this limit.
    int32 page_size = 1;

    // page_token is an opaque cursor returned by a previous
    // ListRoundsResponse. Pass it to resume listing from where the
    // previous page ended.
    string page_token = 2;

    // persisted_only when true skips in-memory pending rounds and
    // returns only rounds that have been persisted to disk
    // (input_sig_sent, confirmed, etc.).
    bool persisted_only = 3;

    // state_filter restricts results to a single state when set to a value
    // other than ROUND_STATE_UNKNOWN.
    RoundState state_filter = 4;

    // created_after restricts persisted rows to rounds created at or after
    // the given Unix timestamp. Pending in-memory rounds are not filtered by
    // creation time because they do not expose a stable creation timestamp.
    int64 created_after = 5;

    // created_before restricts persisted rows to rounds created at or before
    // the given Unix timestamp. Pending in-memory rounds are not filtered by
    // creation time because they do not expose a stable creation timestamp.
    int64 created_before = 6;
}

message GetRoundRequest {
    // round_id identifies the server-assigned round to fetch.
    string round_id = 1;
}

message GetRoundResponse {
    // round is the matching round status.
    RoundInfo round = 1;
}

message ListRoundsResponse {
    // rounds lists the current state of all round FSM instances.
    repeated RoundInfo rounds = 1;

    // next_page_token is an opaque cursor for the next page. Empty
    // when there are no more results.
    string next_page_token = 2;
}

message WatchRoundsRequest {
}

message WatchRoundsResponse {
    // round contains the updated round state. Sent whenever a round
    // FSM transitions to a new state.
    RoundInfo round = 1;
}

enum OORSessionDirection {
    OOR_SESSION_DIRECTION_UNSPECIFIED = 0;
    OOR_SESSION_DIRECTION_OUTGOING = 1;
    OOR_SESSION_DIRECTION_INCOMING = 2;
}

enum OORSessionStatus {
    OOR_SESSION_STATUS_UNSPECIFIED = 0;
    OOR_SESSION_STATUS_PENDING = 1;
    OOR_SESSION_STATUS_COMPLETED = 2;
    OOR_SESSION_STATUS_FAILED = 3;
}

message OORSessionInfo {
    // session_id is the stable OOR session identifier.
    string session_id = 1;

    // direction is from the local client's perspective.
    OORSessionDirection direction = 2;

    // status is the coarse operation state.
    OORSessionStatus status = 3;

    // phase is the detailed OOR FSM phase string.
    string phase = 4;

    // created_at is the Unix timestamp when the persisted package was first
    // recorded, when known.
    int64 created_at = 5;

    // updated_at is the Unix timestamp when the session/package was last
    // updated, when known.
    int64 updated_at = 6;

    // consumed_outpoints are locally known VTXOs consumed by this session.
    repeated string consumed_outpoints = 7;

    // created_outpoints are locally known VTXOs created by this session.
    repeated string created_outpoints = 8;

    // failure_reason is populated for failed live OOR sessions when known.
    string failure_reason = 9;
}

message ListOORSessionsRequest {
    // page_size is the maximum number of sessions to return. If zero, the
    // daemon uses a default page size.
    int32 page_size = 1;

    // page_token is an opaque session cursor returned by a previous
    // ListOORSessionsResponse.
    string page_token = 2;

    // direction_filter restricts results by local direction when set.
    OORSessionDirection direction_filter = 3;

    // status_filter restricts results by operation status when set.
    OORSessionStatus status_filter = 4;
}

message ListOORSessionsResponse {
    // sessions lists locally known OOR operation status entries.
    repeated OORSessionInfo sessions = 1;

    // next_page_token is an opaque cursor for the next page. Empty when
    // there are no more results.
    string next_page_token = 2;
}

message GetOORSessionRequest {
    // session_id identifies the OOR session to fetch.
    string session_id = 1;
}

message GetOORSessionResponse {
    // session is the matching OOR operation status.
    OORSessionInfo session = 1;
}

// EstimateFeeRequest asks the operator to estimate the fee for a
// VTXO operation at current rates and utilization.
message EstimateFeeRequest {
    // amount_sat is the VTXO amount to estimate fees for.
    int64 amount_sat = 1;

    // is_boarding indicates whether this is a new boarding (true)
    // or a refresh/forfeit (false).
    bool is_boarding = 2;

    // remaining_blocks is the remaining lifetime of the forfeited
    // VTXO in blocks. Only used when is_boarding is false.
    uint32 remaining_blocks = 3;
}

// EstimateFeeResponse contains the itemized fee breakdown from
// the operator.
message EstimateFeeResponse {
    // liquidity_fee_sat is the time-value-of-money component.
    int64 liquidity_fee_sat = 1;

    // onchain_share_sat is the per-participant on-chain cost.
    int64 onchain_share_sat = 2;

    // margin_sat is the fixed operator margin.
    int64 margin_sat = 3;

    // total_fee_sat is the sum of all components.
    int64 total_fee_sat = 4;

    // effective_annual_rate is the rate after utilization spread.
    double effective_annual_rate = 5;

    // min_viable_amount_sat is the minimum economically viable
    // VTXO at current rates.
    int64 min_viable_amount_sat = 6;

    // below_dust_warning is true when the requested amount is
    // below the minimum viable threshold. Automated callers
    // MUST check this field before acting on the fee estimate:
    // a VTXO below the minimum viable amount is uneconomic to
    // exit (miner fees exceed the VTXO value) and should be
    // rejected client-side rather than paid for.
    bool below_dust_warning = 7;
}

// GetFeeHistoryRequest requests paginated fee history from the
// client's local ledger. Entries are returned in newest-first order
// (created_at descending), so offset 0 always references the most
// recent ledger entry. Callers paginating through the full history
// should treat the order as stable across pages but may observe new
// entries appearing at offset 0 between calls.
message GetFeeHistoryRequest {
    // limit bounds the number of results.
    uint32 limit = 1;

    // offset is the number of entries to skip.
    uint32 offset = 2;
}

// FeeHistoryEntry is a single ledger entry from the client's
// accounting database. Each row is one leg of the double-entry
// ledger; debit_account and credit_account name the two accounts
// touched (chart of accounts: wallet_balance, vtxo_balance,
// fees_paid, onchain_fees, transfers_in, transfers_out).
//
// CAVEAT: Round-created VTXOs are currently always booked against
// transfers_in regardless of whether the VTXO actually represents
// an incoming transfer from a counterparty or the client's own
// boarded funds. Boarding rounds are therefore NOT yet paired with
// a fees_paid leg, and the wallet_balance offset is not yet booked
// either. Until the round FSM surfaces per-VTXO provenance and the
// operator-fee amount, callers must treat transfers_in as an upper
// bound on real counterparty receipts and the fees_paid total as a
// lower bound on actual operator fees paid by this client.
//
// CAVEAT: Unilateral exits emit only the send leg (transfers_out
// debit, vtxo_balance credit) at FSM transition time. The miner
// fee and confirmation height aren't observable at that point, so
// the matching onchain_fees leg is not booked until the chain
// resolver follows up; that follow-up wiring is not yet in place,
// so onchain_fees stays at 0 for exits. Callers cannot rely on
// onchain_fees to attribute L1 exit costs in the current release.
message FeeHistoryEntry {
    // entry_id is the unique entry identifier.
    int64 entry_id = 1;

    // event_type classifies the entry. Mirrors the ledger
    // package Event* constants ("boarding_fee_paid",
    // "refresh_fee_paid", "onchain_fee_paid", "vtxo_received",
    // "vtxo_sent").
    string event_type = 2;

    // amount_sat is the entry amount in satoshis.
    int64 amount_sat = 3;

    // description is a human-readable note.
    string description = 4;

    // created_at_unix_s is the Unix timestamp.
    int64 created_at_unix_s = 5;

    // debit_account names the account being debited in this leg
    // (e.g. "fees_paid", "transfers_out").
    string debit_account = 6;

    // credit_account names the account being credited in this
    // leg (e.g. "vtxo_balance", "wallet_balance").
    string credit_account = 7;

    // round_id is the 16-byte round UUID associated with the
    // entry, when applicable. Empty for non-round events such
    // as OOR sends or wallet-only audit entries.
    bytes round_id = 8;

    // session_id is the 32-byte OOR session identifier
    // associated with the entry, when applicable. Empty for
    // in-round events.
    bytes session_id = 9;
}

// GetFeeHistoryResponse contains paginated fee history entries.
message GetFeeHistoryResponse {
    // entries is the list of fee history entries.
    repeated FeeHistoryEntry entries = 1;

    // total_fees_paid_sat is the cumulative total of all fees
    // paid by this client.
    int64 total_fees_paid_sat = 2;
}

message ListTransactionsRequest {
    // from_unix_s filters entries created at or after this Unix timestamp.
    // A zero value leaves the lower bound open.
    int64 from_unix_s = 1;

    // to_unix_s filters entries created at or before this Unix timestamp. A
    // zero value leaves the upper bound open.
    int64 to_unix_s = 2;

    // limit bounds the number of results. Zero uses the daemon default.
    uint32 limit = 3;

    // offset is the number of filtered entries to skip.
    uint32 offset = 4;

    // type filters entries by high-level transaction type. Accepted values
    // are "boarding", "round", "oor", and "sweep". Empty lists all.
    // "sweep" includes tracked boarding sweep transactions and
    // chain-sweep-related ledger entries, such as unilateral-exit
    // onchain_fee_paid rows.
    string type = 5;
}

message TransactionHistoryEntry {
    // source names the local persistence source: "ledger" or
    // "boarding_sweep".
    string source = 1;

    // type is the high-level category: "boarding", "round", "oor", or
    // "sweep".
    string type = 2;

    // subtype carries the ledger event type or sweep lifecycle status.
    string subtype = 3;

    // amount_sat is the gross transaction amount in satoshis.
    int64 amount_sat = 4;

    // fee_sat is set for persisted aggregate sweep transactions.
    int64 fee_sat = 5;

    // created_at_unix_s is the local Unix timestamp for the row.
    int64 created_at_unix_s = 6;

    // confirmation_status is "confirmed", "recorded", or the persisted
    // aggregate sweep status.
    string confirmation_status = 7;

    // description is a human-readable local note.
    string description = 8;

    // entry_id is set for ledger-backed rows.
    int64 entry_id = 9;

    // txid is set for transaction-backed rows such as aggregate boarding
    // sweeps.
    string txid = 10;

    // debit_account names the account debited by a ledger-backed row.
    string debit_account = 11;

    // credit_account names the account credited by a ledger-backed row.
    string credit_account = 12;

    // round_id is the 16-byte round UUID associated with the row, when
    // applicable.
    bytes round_id = 13;

    // session_id is the 32-byte OOR session identifier associated with the
    // row, when applicable.
    bytes session_id = 14;

    // confirmation_height is set when the source records a chain
    // confirmation height.
    int32 confirmation_height = 15;
}

message ListTransactionsResponse {
    // transactions are returned newest first by created_at_unix_s.
    repeated TransactionHistoryEntry transactions = 1;

    // next_offset is the offset to pass to the next request when has_more is
    // true.
    uint32 next_offset = 2;

    // has_more is true when another page is available.
    bool has_more = 3;
}

message UnrollRequest {
    // outpoint is the VTXO outpoint to unilaterally exit, formatted as
    // "txid:index".
    string outpoint = 1;
}

message UnrollResponse {
    // created indicates whether a new unroll job was spawned. False if
    // an existing job already covers this target.
    bool created = 1;

    // actor_id is the identifier of the durable unroll job actor.
    string actor_id = 2;
}

message GetUnrollStatusRequest {
    // outpoint is the VTXO outpoint to query, formatted as "txid:index".
    string outpoint = 1;
}

// UnrollJobStatus represents the high-level phase of an unroll job.
enum UnrollJobStatus {
    UNROLL_JOB_STATUS_UNSPECIFIED = 0;

    // UNROLL_JOB_STATUS_PENDING indicates the job has been created but
    // has not yet started materializing recovery transactions.
    UNROLL_JOB_STATUS_PENDING = 1;

    // UNROLL_JOB_STATUS_MATERIALIZING indicates recovery transactions
    // are being broadcast and confirmed on-chain.
    UNROLL_JOB_STATUS_MATERIALIZING = 2;

    // UNROLL_JOB_STATUS_CSV_PENDING indicates all recovery transactions
    // are confirmed and the job is waiting for the CSV delay to expire.
    UNROLL_JOB_STATUS_CSV_PENDING = 3;

    // UNROLL_JOB_STATUS_SWEEPING indicates the CSV delay has expired
    // and the sweep transaction is being broadcast/confirmed.
    UNROLL_JOB_STATUS_SWEEPING = 4;

    // UNROLL_JOB_STATUS_COMPLETED is terminal: the sweep confirmed and
    // the funds are in the on-chain wallet.
    UNROLL_JOB_STATUS_COMPLETED = 5;

    // UNROLL_JOB_STATUS_FAILED is terminal: the unroll encountered an
    // unrecoverable error.
    UNROLL_JOB_STATUS_FAILED = 6;
}

message GetUnrollStatusResponse {
    // found is true if an unroll job exists for the requested outpoint.
    bool found = 1;

    // status is the current high-level phase of the unroll job.
    UnrollJobStatus status = 2;

    // sweep_txid is the txid of the sweep transaction, set once the
    // sweep has been broadcast.
    string sweep_txid = 3;

    // last_error contains the failure reason if the job is in FAILED
    // status.
    string last_error = 4;
}
